<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Timing Cuba Live</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    h1 {
      font-size: 34px;
      margin-top: 20px;
    }

    .box {
      display: inline-block;
      width: 45%;
      vertical-align: top;
      margin-top: 40px;
    }

    .name {
      font-size: 42px;
      font-weight: bold;
    }

    .score {
      font-size: 130px;
      font-weight: bold;
    }

    .rojo { color: red; }
    .azul { color: blue; }

    .timer {
      font-size: 85px;
      margin-top: 25px;
    }

    .periodo {
      font-size: 24px;
    }

    #estado {
      margin-top: 20px;
      font-size: 18px;
      color: gray;
    }
  </style>
</head>

<body>

<h1>LIVE TIMING CUBA</h1>

<div class="box rojo">
  <div id="rojo_nombre" class="name">CARGANDO...</div>
  <div id="rojo_puntos" class="score">0</div>
</div>

<div class="box azul">
  <div id="azul_nombre" class="name">CARGANDO...</div>
  <div id="azul_puntos" class="score">0</div>
</div>

<div id="reloj" class="timer">00:00</div>
<div id="periodo" class="periodo">R1</div>
<div id="estado">Conectando...</div>

<script>
  const URL = "https://timing-cuba-live-2026-default-rtdb.firebaseio.com/evento/copa-habana-2026/marcador.json";

  async function cargarMarcador() {
    try {
      const respuesta = await fetch(URL + "?t=" + Date.now());
      const data = await respuesta.json();

      if (!data) {
        document.getElementById("estado").innerText = "Sin datos en Firebase";
        return;
      }

      document.getElementById("rojo_nombre").innerText = data.rojo_nombre || "---";
      document.getElementById("azul_nombre").innerText = data.azul_nombre || "---";
      document.getElementById("rojo_puntos").innerText = data.rojo_puntos ?? 0;
      document.getElementById("azul_puntos").innerText = data.azul_puntos ?? 0;
      document.getElementById("reloj").innerText = data.reloj || "00:00";
      document.getElementById("periodo").innerText = data.periodo || "R1";
      document.getElementById("estado").innerText = "EN VIVO";
    } catch (error) {
      document.getElementById("estado").innerText = "Error conectando con Firebase";
      console.log(error);
    }
  }

  cargarMarcador();
  setInterval(cargarMarcador, 1000);
</script>

</body>
</html>
