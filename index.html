<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Timing Cuba Live</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    /* LOGO */
    .logo {
      margin-top: 10px;
    }

    .logo img {
      width: 140px;
      filter: drop-shadow(0 0 10px gold);
    }

    /* TITULO */
    h1 {
      font-size: 28px;
      color: gold;
      margin-top: 5px;
      letter-spacing: 2px;
    }

    /* CONTENEDORES */
    .box {
      display: inline-block;
      width: 45%;
      vertical-align: top;
      margin-top: 30px;
      border: 2px solid gold;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(255,215,0,0.4);
    }

    .name {
      font-size: 36px;
      font-weight: bold;
    }

    .score {
      font-size: 120px;
      font-weight: bold;
    }

    .rojo { color: red; }
    .azul { color: blue; }

    /* RELOJ */
    .timer {
      font-size: 90px;
      margin-top: 30px;
      color: white;
      text-shadow: 0 0 10px gold;
    }

    .periodo {
      font-size: 26px;
      color: gold;
    }

    #estado {
      margin-top: 15px;
      font-size: 16px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
</div>

<h1>LIVE TIMING CUBA</h1>

<div class="box rojo">
  <div id="rojo_nombre" class="name">---</div>
  <div id="rojo_puntos" class="score">0</div>
</div>

<div class="box azul">
  <div id="azul_nombre" class="name">---</div>
  <div id="azul_puntos" class="score">0</div>
</div>

<div id="reloj" class="timer">00:00</div>
<div id="periodo" class="periodo">R1</div>
<div id="estado">Conectando...</div>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbwZTsD8afCQeHofxLRF7spa3Y6letC7HIRakEA407zUosKIqO8fXqE3-i87zXe05jve/exec";

  async function cargarMarcador() {
    try {
      const respuesta = await fetch(URL + "?t=" + Date.now());
      const data = await respuesta.json();

      document.getElementById("rojo_nombre").innerText = data.rojo_nombre || "---";
      document.getElementById("azul_nombre").innerText = data.azul_nombre || "---";
      document.getElementById("rojo_puntos").innerText = data.rojo_puntos ?? 0;
      document.getElementById("azul_puntos").innerText = data.azul_puntos ?? 0;
      document.getElementById("reloj").innerText = data.reloj || "00:00";
      document.getElementById("periodo").innerText = data.periodo || "R1";
      document.getElementById("estado").innerText = "EN VIVO";
    } catch (error) {
      document.getElementById("estado").innerText = "Error conexión";
      console.log(error);
    }
  }

  cargarMarcador();
  setInterval(cargarMarcador, 1000);
</script>

</body>
</html>
