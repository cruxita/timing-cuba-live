<script>
  const URL = "https://script.google.com/macros/s/AKfycbyk17adLpbWl4T15I7iWHvmUhdPK6N3oSvFNzXksiH7c0BRg2J35eg2bLetmcAtYhOx/exec";

  let puntosRojoAnterior = null;
  let puntosAzulAnterior = null;

  function setText(id, valor, defecto) {
    const el = document.getElementById(id);
    if (el) {
      el.innerText = valor || defecto;
    }
  }

  function animarSiCambio(id, nuevo, anterior) {
    const el = document.getElementById(id);
    if (!el) return;

    if (anterior !== null && Number(nuevo) !== Number(anterior)) {
      el.classList.remove("bump");
      void el.offsetWidth;
      el.classList.add("bump");
    }
  }

  async function cargarMarcador() {
    try {
      const respuesta = await fetch(URL + "?t=" + Date.now(), {
        cache: "no-store"
      });

      if (!respuesta.ok) {
        throw new Error("Respuesta no válida del servidor: " + respuesta.status);
      }

      const data = await respuesta.json();

      const rojoPts = Number(data.rojo_puntos ?? 0);
      const azulPts = Number(data.azul_puntos ?? 0);

      const panelRojo = document.querySelector(".panel-rojo");
      const panelAzul = document.querySelector(".panel-azul");

      if (panelRojo && panelAzul) {
        panelRojo.classList.remove("lider", "ganador-final");
        panelAzul.classList.remove("lider", "ganador-final");

        const estadoLive = String(data.estado_combate || data.estado || "").toUpperCase();
        const ganadorLado = String(data.ganador_lado || "").toUpperCase();
        const ventajaLado = String(data.ventaja_lado || "").toUpperCase();

        if (estadoLive === "FINALIZADO" && ganadorLado === "RED") {
          panelRojo.classList.add("ganador-final");
        } else if (estadoLive === "FINALIZADO" && ganadorLado === "BLUE") {
          panelAzul.classList.add("ganador-final");
        } else if (rojoPts === azulPts && ventajaLado === "RED") {
          panelRojo.classList.add("lider");
        } else if (rojoPts === azulPts && ventajaLado === "BLUE") {
          panelAzul.classList.add("lider");
        } else if (rojoPts > azulPts) {
          panelRojo.classList.add("lider");
        } else if (azulPts > rojoPts) {
          panelAzul.classList.add("lider");
        }
      }

      animarSiCambio("rojo_puntos", rojoPts, puntosRojoAnterior);
      animarSiCambio("azul_puntos", azulPts, puntosAzulAnterior);

      puntosRojoAnterior = rojoPts;
      puntosAzulAnterior = azulPts;

      setText("evento_nombre", data.evento_nombre, "COPA HABANA 2026");

      const tatami = data.tapiz || data.tatami || "Tapiz 1";
      const categoria = data.categoria || "U13/15";
      const peso = data.peso || "32 KG";
      const estilo = data.estilo || "Libre";

      const divisionInfo = document.getElementById("division_info");
      if (divisionInfo) {
        divisionInfo.innerText = `${tatami} · ${categoria} · ${peso} · ${estilo}`;
      }

      setText("rojo_nombre", data.rojo_nombre, "---");
      setText("azul_nombre", data.azul_nombre, "---");

      setText("rojo_puntos", rojoPts, "0");
      setText("azul_puntos", azulPts, "0");

      setText("reloj", data.reloj, "00:00");
      setText("periodo", data.periodo, "R1");
      setText("estado_combate", data.estado_combate || data.estado, "EN VIVO");

      setText("proximo_combate", data.proximo_combate, "Esperando próximo combate...");
      setText("resultado_final", data.resultado_final, "Resultado: combate en progreso");

      const historial = data.historial || ["Sin resultados recientes"];
      const historialBox = document.getElementById("historial");

      if (historialBox) {
        historialBox.innerHTML = "";

        if (Array.isArray(historial)) {
          historial.slice(0, 3).forEach(item => {
            const div = document.createElement("div");
            div.className = "history-line";
            div.innerText = item;
            historialBox.appendChild(div);
          });
        } else {
          const div = document.createElement("div");
          div.className = "history-line";
          div.innerText = historial;
          historialBox.appendChild(div);
        }
      }

      setText("estado", "EN VIVO", "EN VIVO");

    } catch (error) {
      setText("estado", "Esperando actualización del evento...", "Esperando actualización del evento...");
      console.log("Error cargando marcador:", error);
    }
  }

  function pantallaCompleta() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    }
  }

  cargarMarcador();
  setInterval(cargarMarcador, 700);
</script>
