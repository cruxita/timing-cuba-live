<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Timing Cuba Live</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 215, 0, 0.16), transparent 35%),
        linear-gradient(180deg, #080808, #000);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .topbar {
      padding: 10px 18px 6px;
      display: grid;
      grid-template-columns: 120px 1fr 170px;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 92px;
      filter: drop-shadow(0 0 14px gold);
    }

    .event-title {
      color: gold;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.55);
    }

    .sub-info {
      margin-top: 5px;
      color: #ddd;
      font-size: 18px;
      font-weight: bold;
    }

    .fullscreen-btn {
      border: 2px solid gold;
      background: #111;
      color: gold;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.35);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 340px 1fr;
      gap: 12px;
      padding: 8px 22px 0;
      align-items: stretch;
    }

    .panel {
      border: 4px solid gold;
      border-radius: 22px;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 22px rgba(255, 215, 0, 0.55);
      background: rgba(0, 0, 0, 0.88);
      position: relative;
      overflow: hidden;
    }

    .panel-rojo {
      background: linear-gradient(135deg, #380000, #120000 55%, #050000);
    }

    .panel-azul {
      background: linear-gradient(135deg, #001f55, #000b24 55%, #00030a);
    }

    .lider {
      box-shadow: 0 0 35px gold, 0 0 60px rgba(255,215,0,0.5);
      transform: scale(1.02);
      transition: all 0.2s ease;
    }

    .ganador-final {
      border: 6px solid white !important;
      box-shadow:
        0 0 35px white,
        0 0 65px gold,
        inset 0 0 35px rgba(255, 255, 255, 0.35) !important;
      transform: scale(1.025);
    }

    .ganador-final::after {
      content: "GANADOR";
      position: absolute;
      top: 10px;
      right: 12px;
      background: gold;
      color: black;
      font-size: 13px;
      font-weight: 900;
      padding: 4px 9px;
      border-radius: 999px;
      box-shadow: 0 0 10px gold;
      z-index: 2;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background: linear-gradient(135deg, gold, transparent 45%, gold);
      pointer-events: none;
    }

    .name {
      font-size: 44px;
      font-weight: 900;
      margin-bottom: 18px;
      z-index: 1;
    }

    .score {
      font-size: 176px;
      font-weight: 900;
      line-height: 1;
      z-index: 1;
    }

    .rojo { color: #ff1010; }
    .azul { color: #1060ff; }

    .score.bump {
      animation: bump 0.35s ease;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); text-shadow: 0 0 30px gold; }
      100% { transform: scale(1); }
    }

    .center {
      border: 4px solid gold;
      border-radius: 22px;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 28px rgba(255, 215, 0, 0.8);
      background: radial-gradient(circle, rgba(110, 95, 0, 0.28), #000 72%);
    }

    .status {
      display: inline-block;
      margin: 0 auto 18px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.16);
      border: 2px solid gold;
      color: gold;
      font-size: 18px;
      font-weight: 900;
    }

    .timer {
      font-size: 98px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 16px gold;
      line-height: 1;
    }

    .periodo {
      margin-top: 18px;
      font-size: 34px;
      font-weight: 900;
      color: gold;
    }

    .result {
      margin: 15px 22px 0;
      padding: 13px;
      border: 2px solid rgba(255, 215, 0, 0.7);
      border-radius: 16px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      background: rgba(255, 215, 0, 0.08);
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 14px 22px 0;
    }

    .card {
      border: 2px solid rgba(255, 215, 0, 0.65);
      border-radius: 18px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.75);
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.28);
      text-align: left;
    }

    .card-title {
      color: gold;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    .history-line {
      font-size: 17px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    #estado {
      margin: 12px 0 10px;
      font-size: 15px;
      color: #aaa;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .logo img {
        width: 100px;
      }

      .event-title {
        font-size: 25px;
      }

      .sub-info {
        font-size: 15px;
      }

      .fullscreen-btn {
        width: 80%;
        margin: auto;
      }

      .main {
        grid-template-columns: 1fr;
        padding: 8px 12px 0;
      }

      .center {
        order: -1;
        min-height: 190px;
      }

      .panel {
        min-height: 210px;
      }

      .timer {
        font-size: 72px;
      }

      .score {
        font-size: 116px;
      }

      .name {
        font-size: 30px;
      }

      .bottom {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .result {
        margin: 12px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">
      <img src="logo.png" alt="Timing Cuba Logo">
    </div>

    <div>
      <div id="evento_nombre" class="event-title">COPA HABANA 2026</div>
      <div id="division_info" class="sub-info">Tapiz 1 · U13/15 · 32 KG · Libre</div>
    </div>

    <button class="fullscreen-btn" onclick="pantallaCompleta()">PANTALLA COMPLETA</button>
  </div>

  <div class="main">
    <div class="panel panel-rojo">
      <div id="rojo_nombre" class="name rojo">---</div>
      <div id="rojo_puntos" class="score rojo">0</div>
    </div>

    <div class="center">
      <div id="estado_combate" class="status">EN VIVO</div>
      <div id="reloj" class="timer">00:00</div>
      <div id="periodo" class="periodo">R1</div>
    </div>

    <div class="panel panel-azul">
      <div id="azul_nombre" class="name azul">---</div>
      <div id="azul_puntos" class="score azul">0</div>
    </div>
  </div>

  <div id="resultado_final" class="result">Resultado: combate en progreso</div>

  <div class="bottom">
    <div class="card">
      <div class="card-title">PRÓXIMO COMBATE</div>
      <div id="proximo_combate" class="card-text">Esperando próximo combate...</div>
    </div>

    <div class="card">
      <div class="card-title">ÚLTIMOS RESULTADOS</div>
      <div id="historial">
        <div class="history-line">Sin resultados recientes</div>
      </div>
    </div>
  </div>

  <div id="estado">Conectando...</div>

  <script>
    const URL = "https://timing-cuba-live-2026-default-rtdb.firebaseio.com/evento/copa-habana-2026/marcador.json";
  
    let puntosRojoAnterior = null;
    let puntosAzulAnterior = null;
  
    let relojBaseSegundos = 0;
    let relojBaseMomento = 0;
    let relojDebeCorrer = false;
    let relojInicializado = false;
    let periodoLive = "R1";
    let limitePrimerTiempoLive = 180;
  
    function setText(id, valor, defecto) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerText = (valor === undefined || valor === null || valor === "") ? defecto : valor;
    }
  
    function animarSiCambio(id, nuevo, anterior) {
      const el = document.getElementById(id);
      if (!el) return;
  
      if (anterior !== null && Number(nuevo) !== Number(anterior)) {
        el.classList.remove("bump");
        void el.offsetWidth;
        el.classList.add("bump");
      }
    }
  
    function textoRelojASegundos(txt) {
      txt = String(txt || "00:00").trim();
      const partes = txt.split(":");
      if (partes.length !== 2) return 0;
  
      const min = Number(partes[0] || 0);
      const seg = Number(partes[1] || 0);
  
      return Math.max(0, (min * 60) + seg);
    }
  
    function segundosATextoReloj(total) {
      total = Math.max(0, Math.floor(Number(total || 0)));
  
      const min = Math.floor(total / 60);
      const seg = total % 60;
  
      return String(min).padStart(2, "0") + ":" + String(seg).padStart(2, "0");
    }
  
    function relojActualCalculado() {
      let actual = relojBaseSegundos;
  
      if (relojDebeCorrer && relojBaseMomento) {
        const pasado = (Date.now() - relojBaseMomento) / 1000;
        actual = relojBaseSegundos - pasado;
      }
  
      return Math.max(0, actual);
    }
  
    function actualizarRelojSuaveSeguro() {
      if (!relojBaseMomento) return;
  
      let nuevo = relojActualCalculado();
  
      if (relojDebeCorrer) {
        if (periodoLive === "R1" && nuevo <= limitePrimerTiempoLive) {
          nuevo = limitePrimerTiempoLive;
          relojDebeCorrer = false;
        }
  
        if (periodoLive === "R2" && nuevo <= 0) {
          nuevo = 0;
          relojDebeCorrer = false;
        }
      }
  
      setText("reloj", segundosATextoReloj(nuevo), "00:00");
    }
  
    function actualizarBaseRelojDesdeServidor(data, estadoActual) {
      const servidorSegundos = Number(
        data.reloj_segundos ?? textoRelojASegundos(data.reloj || "00:00")
      );
  
      const servidorCorriendo =
        Boolean(data.reloj_corriendo) && estadoActual === "EN VIVO";

      if (estadoActual !== "EN VIVO" || data.reloj_corriendo !== true) {
        relojBaseSegundos = servidorSegundos;
        relojBaseMomento = Date.now();
        relojDebeCorrer = false;
        relojInicializado = true;
        return;
      }
  
      periodoLive = String(data.periodo || "R1").toUpperCase();
  
      if (periodoLive === "R1") {
        limitePrimerTiempoLive = servidorSegundos <= 240 ? 120 : 180;
      }
  
      if (!relojInicializado) {
        relojBaseSegundos = servidorSegundos;
        relojBaseMomento = Date.now();
        relojDebeCorrer = servidorCorriendo;
        relojInicializado = true;
        return;
      }
  
      const actualWeb = relojActualCalculado();
  
      if (servidorCorriendo !== relojDebeCorrer) {
        relojBaseSegundos = servidorSegundos;
        relojBaseMomento = Date.now();
        relojDebeCorrer = servidorCorriendo;
        return;
      }
  
      if (!servidorCorriendo) {
        relojBaseSegundos = servidorSegundos;
        relojBaseMomento = Date.now();
        relojDebeCorrer = false;
        return;
      }
  
      if (servidorSegundos < actualWeb - 1.2) {
        relojBaseSegundos = servidorSegundos;
        relojBaseMomento = Date.now();
        relojDebeCorrer = true;
      }
    }
  
    function pintarMarcador(data) {
      if (!data) return;
  
      const rojoPts = Number(data.rojo_puntos ?? 0);
      const azulPts = Number(data.azul_puntos ?? 0);
  
      const panelRojo = document.querySelector(".panel-rojo");
      const panelAzul = document.querySelector(".panel-azul");
  
      if (panelRojo && panelAzul) {
        panelRojo.classList.remove("lider", "ganador-final");
        panelAzul.classList.remove("lider", "ganador-final");
  
        const estadoLive = String(data.estado_combate || data.estado || "").toUpperCase();
        const ganadorLado = String(data.ganador_lado || "").toUpperCase();
        const ventajaLado = String(data.ventaja_lado || "").toUpperCase();
  
        if (estadoLive === "FINALIZADO" && ganadorLado === "RED") {
          panelRojo.classList.add("ganador-final");
        } else if (estadoLive === "FINALIZADO" && ganadorLado === "BLUE") {
          panelAzul.classList.add("ganador-final");
        } else if (rojoPts === azulPts && ventajaLado === "RED") {
          panelRojo.classList.add("lider");
        } else if (rojoPts === azulPts && ventajaLado === "BLUE") {
          panelAzul.classList.add("lider");
        } else if (rojoPts > azulPts) {
          panelRojo.classList.add("lider");
        } else if (azulPts > rojoPts) {
          panelAzul.classList.add("lider");
        }
      }
  
      animarSiCambio("rojo_puntos", rojoPts, puntosRojoAnterior);
      animarSiCambio("azul_puntos", azulPts, puntosAzulAnterior);
  
      puntosRojoAnterior = rojoPts;
      puntosAzulAnterior = azulPts;
  
      setText("evento_nombre", data.evento_nombre, "COPA HABANA 2026");
  
      const tapiz = data.tapiz || data.tatami || "Tapiz 1";
      const categoria = data.categoria || "U13/15";
      const peso = data.peso || "32 KG";
      const estilo = data.estilo || "Libre";
  
      const divisionInfo = document.getElementById("division_info");
      if (divisionInfo) {
        divisionInfo.innerText = `${tapiz} · ${categoria} · ${peso} · ${estilo}`;
      }
  
      setText("rojo_nombre", data.rojo_nombre, "---");
      setText("azul_nombre", data.azul_nombre, "---");
      setText("rojo_puntos", rojoPts, "0");
      setText("azul_puntos", azulPts, "0");
  
      const estadoActual = String(data.estado_combate || data.estado || "").toUpperCase();
  
      actualizarBaseRelojDesdeServidor(data, estadoActual);
      actualizarRelojSuaveSeguro();
  
      setText("periodo", data.periodo, "R1");
      setText("estado_combate", data.estado_combate || data.estado, "EN VIVO");
  
      setText("proximo_combate", data.proximo_combate, "Esperando próximo combate...");
      setText("resultado_final", data.resultado_final, "Resultado: combate en progreso");
  
      const historial = data.historial || ["Sin resultados recientes"];
      const historialBox = document.getElementById("historial");
  
      if (historialBox) {
        historialBox.innerHTML = "";
  
        if (Array.isArray(historial)) {
          historial.slice(0, 3).forEach(item => {
            const div = document.createElement("div");
            div.className = "history-line";
            div.innerText = item;
            historialBox.appendChild(div);
          });
        } else {
          const div = document.createElement("div");
          div.className = "history-line";
          div.innerText = historial;
          historialBox.appendChild(div);
        }
      }
  
      setText("estado", "EN VIVO", "EN VIVO");
    }
  
    async function cargarMarcador() {
      try {
        const respuesta = await fetch(URL + "?t=" + Date.now(), { cache: "no-store" });
  
        if (!respuesta.ok) {
          throw new Error("Respuesta no válida de Firebase: " + respuesta.status);
        }
  
        const data = await respuesta.json();
  
        if (!data) {
          throw new Error("Firebase respondió vacío");
        }
  
        pintarMarcador(data);
  
      } catch (error) {
        setText("estado", "Esperando actualización del evento...", "Esperando actualización del evento...");
        console.log("Error cargando marcador:", error);
      }
    }
  
    function pantallaCompleta() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      }
    }
  
    cargarMarcador();
  
    setInterval(cargarMarcador, 500);
    setInterval(actualizarRelojSuaveSeguro, 100);
  </script>

</body>
</html>
