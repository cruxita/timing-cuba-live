<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Timing Cuba Live</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    h1 { font-size: 34px; margin-top: 20px; }

    .box {
      display: inline-block;
      width: 45%;
      vertical-align: top;
      margin-top: 40px;
    }

    .name { font-size: 42px; font-weight: bold; }
    .score { font-size: 130px; font-weight: bold; }

    .rojo { color: red; }
    .azul { color: blue; }

    .timer {
      font-size: 85px;
      margin-top: 25px;
    }

    .periodo { font-size: 24px; }

    #estado {
      margin-top: 20px;
      font-size: 18px;
      color: gray;
    }
  </style>
</head>

<body>

<h1>LIVE TIMING CUBA</h1>

<div class="box rojo">
  <div id="rojo_nombre" class="name">---</div>
  <div id="rojo_puntos" class="score">0</div>
</div>

<div class="box azul">
  <div id="azul_nombre" class="name">---</div>
  <div id="azul_puntos" class="score">0</div>
</div>

<div id="reloj" class="timer">00:00</div>
<div id="periodo" class="periodo">R1</div>
<div id="estado">Conectando...</div>

<script>
  const URL = "https://timing-cuba-live-2026-default-rtdb.firebaseio.com/evento/copa-habana-2026/marcador.json";

  window.recibirMarcador = function(data) {
    data = data || {};

    document.getElementById("rojo_nombre").innerText = data.rojo_nombre || "---";
    document.getElementById("azul_nombre").innerText = data.azul_nombre || "---";
    document.getElementById("rojo_puntos").innerText = data.rojo_puntos ?? 0;
    document.getElementById("azul_puntos").innerText = data.azul_puntos ?? 0;
    document.getElementById("reloj").innerText = data.reloj || "00:00";
    document.getElementById("periodo").innerText = data.periodo || "R1";
    document.getElementById("estado").innerText = "EN VIVO";
  };

  function cargarMarcador() {
    const viejo = document.getElementById("firebase_jsonp");
    if (viejo) viejo.remove();

    const script = document.createElement("script");
    script.id = "firebase_jsonp";
    script.src = URL + "?callback=recibirMarcador&t=" + Date.now();

    script.onerror = function() {
      document.getElementById("estado").innerText = "Firebase bloqueado en este móvil";
    };

    document.body.appendChild(script);
  }

  cargarMarcador();
  setInterval(cargarMarcador, 1000);
</script>

</body>
</html>
