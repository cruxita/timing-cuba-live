 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timing Cuba Live</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 215, 0, 0.16), transparent 35%),
        linear-gradient(180deg, #080808, #000);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .topbar {
      padding: 18px 20px 10px;
      display: grid;
      grid-template-columns: 170px 1fr 180px;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      width: 135px;
      max-height: 135px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px gold);
    }

    .event-title {
      color: gold;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.55);
      line-height: 1.05;
    }

    .sub-info {
      margin-top: 8px;
      color: #ddd;
      font-size: 20px;
      font-weight: bold;
    }

    .bout-info {
      margin-top: 6px;
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.45);
    }

    .style-strip {
      margin-top: 8px;
      display: inline-block;
      padding: 6px 18px;
      border: 2px solid gold;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.13);
      color: gold;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.45);
    }

    .fullscreen-btn {
      border: 2px solid gold;
      background: #111;
      color: gold;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.35);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 340px 1fr;
      gap: 12px;
      padding: 22px 22px 0;
      align-items: stretch;
    }

    .panel {
      border: 4px solid gold;
      border-radius: 22px;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 22px rgba(255, 215, 0, 0.55);
      background: rgba(0, 0, 0, 0.88);
      position: relative;
      overflow: hidden;
    }

    .panel-rojo {
      background: linear-gradient(135deg, #380000, #120000 55%, #050000);
    }

    .panel-azul {
      background: linear-gradient(135deg, #001f55, #000b24 55%, #00030a);
    }

    .lider {
      transform: scale(1.02);
      transition: all 0.2s ease;
    }

    .panel-rojo.lider {
      border-color: #ff2a2a;
      box-shadow:
        0 0 28px #ff2a2a,
        0 0 60px rgba(255, 0, 0, 0.50);
    }

    .panel-azul.lider {
      border-color: #2f7cff;
      box-shadow:
        0 0 28px #2f7cff,
        0 0 60px rgba(0, 90, 255, 0.50);
    }

    .ganador-final {
      border: 6px solid white !important;
      transform: scale(1.025);
    }

    .panel-rojo.ganador-final {
      border: 6px solid #ff2a2a !important;
      box-shadow:
        0 0 25px white,
        0 0 40px #ff3a3a,
        0 0 75px rgba(255, 0, 0, 0.65),
        inset 0 0 30px rgba(255, 70, 70, 0.28) !important;
    }

    .panel-azul.ganador-final {
      border: 6px solid #2f7cff !important;
      box-shadow:
        0 0 25px white,
        0 0 40px #3d8bff,
        0 0 75px rgba(0, 90, 255, 0.65),
        inset 0 0 30px rgba(70, 140, 255, 0.28) !important;
    }

    .ganador-final::after {
      display: none;
      content: "";
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background: linear-gradient(135deg, gold, transparent 45%, gold);
      pointer-events: none;
    }

    .name {
      font-size: 44px;
      font-weight: 900;
      margin-bottom: 18px;
      z-index: 1;
    }

    .score {
      font-size: 176px;
      font-weight: 900;
      line-height: 1;
      z-index: 1;
    }

    .rojo { color: #ff1010; }
    .azul { color: #1060ff; }

    .score.bump {
      animation: bump 0.35s ease;
    }

    @keyframes bump {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); text-shadow: 0 0 30px gold; }
      100% { transform: scale(1); }
    }

    .center {
      border: 4px solid gold;
      border-radius: 22px;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 0 28px rgba(255, 215, 0, 0.8);
      background: radial-gradient(circle, rgba(110, 95, 0, 0.28), #000 72%);
    }

    .status {
      display: inline-block;
      margin: 0 auto 18px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.16);
      border: 2px solid gold;
      color: gold;
      font-size: 18px;
      font-weight: 900;
    }

    .timer {
      font-size: 98px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 16px gold;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .periodo {
      margin-top: 18px;
      font-size: 34px;
      font-weight: 900;
      color: gold;
    }

    .result {
      margin: 15px 22px 0;
      padding: 13px;
      border: 2px solid rgba(255, 215, 0, 0.7);
      border-radius: 16px;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      background: rgba(255, 215, 0, 0.08);
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 14px 22px 0;
    }

    .card {
      border: 2px solid rgba(255, 215, 0, 0.65);
      border-radius: 18px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.75);
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.28);
      text-align: left;
    }

    .card-title {
      color: gold;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    .history-line {
      font-size: 17px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    #estado {
      margin: 12px 0 10px;
      font-size: 15px;
      color: #aaa;
    }

    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
      }

      .topbar {
        grid-template-columns: 90px 1fr;
        padding: 10px 8px 6px;
        gap: 8px;
      }

      .logo img {
        width: 82px;
        max-height: 82px;
      }

      .event-title {
        font-size: 22px;
        letter-spacing: 1px;
        line-height: 1.05;
      }

      .sub-info {
        margin-top: 4px;
        font-size: 13px;
      }

      .bout-info {
        margin-top: 3px;
        font-size: 12px;
        letter-spacing: 0.5px;
      }

      .style-strip {
        margin-top: 5px;
        padding: 3px 12px;
        font-size: 15px;
      }

      .fullscreen-btn {
        grid-column: 1 / -1;
        width: 180px;
        margin: 4px auto 0;
        padding: 8px 8px;
        font-size: 12px;
        border-radius: 10px;
      }

      .main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px minmax(0, 1fr);
        gap: 6px;
        padding: 8px 6px 0;
        align-items: stretch;
      }

      .panel,
      .center {
        min-height: 175px;
        border-radius: 14px;
        border-width: 3px;
      }

      .center {
        order: 0;
      }

      .name {
        font-size: 17px;
        line-height: 1.08;
        margin-bottom: 10px;
        padding: 0 4px;
        word-break: break-word;
      }

      .score {
        font-size: 78px;
        line-height: 0.95;
      }

      .status {
        margin-bottom: 10px;
        padding: 5px 9px;
        font-size: 12px;
        border-width: 2px;
      }

      .timer {
        font-size: 42px;
        line-height: 1;
      }

      .periodo {
        margin-top: 10px;
        font-size: 22px;
      }

      .result {
        margin: 8px 6px 0;
        padding: 9px 6px;
        border-radius: 12px;
        font-size: 15px;
      }

      .bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        padding: 8px 6px 0;
      }

      .card {
        border-radius: 12px;
        padding: 8px;
      }

      .card-title {
        font-size: 13px;
        margin-bottom: 5px;
      }

      .card-text {
        font-size: 13px;
        line-height: 1.25;
      }

      .history-line {
        font-size: 12px;
        line-height: 1.25;
      }

      #estado {
        margin: 8px 0 8px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .main {
        grid-template-columns: minmax(0, 1fr) 112px minmax(0, 1fr);
        gap: 5px;
      }

      .panel,
      .center {
        min-height: 155px;
      }

      .name {
        font-size: 14px;
      }

      .score {
        font-size: 64px;
      }

      .timer {
        font-size: 36px;
      }

      .periodo {
        font-size: 19px;
      }

      .status {
        font-size: 11px;
        padding: 4px 7px;
      }

      .event-title {
        font-size: 19px;
      }

      .bottom {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">
      <img src="logo.png" alt="Timing Cuba Logo">
    </div>

    <div>
      <div id="evento_nombre" class="event-title">TIMING CUBA LIVE</div>
      <div id="division_info" class="sub-info">Tapiz 1 · Categoría · Peso</div>
      <div id="combate_info" class="bout-info">Fase · Combate</div>
      <div id="estilo_visible" class="style-strip">FS</div>
    </div>

    <button class="fullscreen-btn" onclick="pantallaCompleta()">PANTALLA COMPLETA</button>
  </div>

  <div class="main">
    <div class="panel panel-rojo">
      <div id="rojo_nombre" class="name rojo">---</div>
      <div id="rojo_puntos" class="score rojo">0</div>
    </div>

    <div class="center">
      <div id="estado_combate" class="status">EN VIVO</div>
      <div id="reloj" class="timer">00:00</div>
      <div id="periodo" class="periodo">R1</div>
    </div>

    <div class="panel panel-azul">
      <div id="azul_nombre" class="name azul">---</div>
      <div id="azul_puntos" class="score azul">0</div>
    </div>
  </div>

  <div id="resultado_final" class="result">Resultado: combate en progreso</div>

  <div class="bottom">
    <div class="card">
      <div class="card-title">PRÓXIMO COMBATE</div>
      <div id="proximo_combate" class="card-text">Esperando próximo combate...</div>
    </div>

    <div class="card">
      <div class="card-title">ÚLTIMOS RESULTADOS</div>
      <div id="historial">
        <div class="history-line">Sin resultados recientes</div>
      </div>
    </div>
  </div>

  <div id="estado">Conectando...</div>

  <script>
    var URL_FIREBASE = "https://timing-cuba-live-2026-default-rtdb.firebaseio.com/evento/copa-habana-2026/marcador.json";
    var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyk17adLpbWl4T15I7iWHvmUhdPK6N3oSvFNzXksiH7c0BRg2J35eg2bLetmcAtYhOx/exec";

    var puntosRojoAnterior = null;
    var puntosAzulAnterior = null;

    var ultimoDato = null;
    var ultimaVersionRecibida = 0;

    function valorSeguro(valor, defecto) {
      if (valor === undefined || valor === null || valor === "") {
        return defecto;
      }
      return valor;
    }

    function setText(id, valor, defecto) {
      var el = document.getElementById(id);
      if (!el) return;

      if (valor === undefined || valor === null || valor === "") {
        el.innerText = defecto;
      } else {
        el.innerText = valor;
      }
    }

    function normalizarEstilo(estilo) {
      var txt = String(estilo || "").trim().toUpperCase();

      if (txt === "LIBRE" || txt === "MASCULINA" || txt === "FREESTYLE") return "FS";
      if (txt === "FEMENINA" || txt === "WOMEN" || txt === "WOMEN'S" || txt === "WOMENS") return "WW";
      if (txt === "GRECO" || txt === "GRECORROMANA" || txt === "GRECO-ROMANA") return "GR";
      if (txt === "FS" || txt === "GR" || txt === "WW") return txt;

      return txt || "FS";
    }

    function boolLive(valor) {
      if (valor === true) return true;
      if (valor === false) return false;

      var txt = String(valor || "").trim().toLowerCase();
      return txt === "true" || txt === "1" || txt === "yes" || txt === "si" || txt === "sí";
    }

    function animarSiCambio(id, nuevo, anterior) {
      var el = document.getElementById(id);
      if (!el) return;

      if (anterior !== null && Number(nuevo) !== Number(anterior)) {
        el.classList.remove("bump");
        void el.offsetWidth;
        el.classList.add("bump");
      }
    }

    function textoRelojASegundos(txt) {
      txt = String(txt || "00:00").trim();

      if (/^\d+(\.\d+)?$/.test(txt)) {
        return Math.max(0, Number(txt));
      }

      var partes = txt.split(":");
      if (partes.length !== 2) return 0;

      var min = Number(partes[0] || 0);
      var seg = Number(partes[1] || 0);

      return Math.max(0, (min * 60) + seg);
    }

    function dosDigitos(n) {
      n = Number(n || 0);
      if (n < 10) {
        return "0" + n;
      }
      return String(n);
    }

    function segundosATextoReloj(total) {
      total = Math.max(0, Math.floor(Number(total || 0)));

      var min = Math.floor(total / 60);
      var seg = total % 60;

      return dosDigitos(min) + ":" + dosDigitos(seg);
    }

    function calcularRelojInternet(data) {
      if (!data) return "00:00";

      var relojFuente = valorSeguro(
        data.reloj_segundos,
        textoRelojASegundos(data.reloj || "00:00")
      );

      var baseSegundos = Number(relojFuente);

      var estado = String(data.estado_combate || data.estado || "").toUpperCase();
      var periodo = String(data.periodo || "").toUpperCase();
      var categoria = String(data.categoria || "").toUpperCase();

      var cortePrimerTiempo = 120;

      if (
        categoria.indexOf("U20") >= 0 ||
        categoria.indexOf("U23") >= 0 ||
        categoria.indexOf("SENIOR") >= 0
      ) {
        cortePrimerTiempo = 180;
      }

      var corriendo =
        boolLive(data.reloj_corriendo) &&
        estado !== "PAUSADO" &&
        estado !== "FINALIZADO";

      if (corriendo) {
        var baseServidor = Number(
          data.reloj_base_server_at ||
          data.live_server_at ||
          data.live_sent_at ||
          new Date().getTime()
        );

        var pasado = Math.floor((new Date().getTime() - baseServidor) / 1000);
        baseSegundos = Math.max(0, baseSegundos - pasado);
      }

      if (periodo === "R1" && corriendo && baseSegundos <= cortePrimerTiempo) {
        baseSegundos = cortePrimerTiempo;
      }

      return segundosATextoReloj(baseSegundos);
    }

    function actualizarRelojVisual() {
      if (!ultimoDato) return;
      setText("reloj", calcularRelojInternet(ultimoDato), "00:00");
    }

    function clasificacionFinalTexto(data) {
      if (!data) return "";

      var estadoLive = String(data.estado_combate || data.estado || "").toUpperCase();
      if (estadoLive !== "FINALIZADO") return "";

      var resultadoFinal = String(data.resultado_final || "").toUpperCase();

      var rojoPts = Number(valorSeguro(data.rojo_puntos, 0));
      var azulPts = Number(valorSeguro(data.azul_puntos, 0));

      var ganador = String(data.ganador_lado || "").toUpperCase();

      if (!ganador) {
        if (rojoPts > azulPts) ganador = "RED";
        else if (azulPts > rojoPts) ganador = "BLUE";
      }

      var ganadorPts = 0;
      var perdedorPts = 0;

      if (ganador === "RED") {
        ganadorPts = rojoPts;
        perdedorPts = azulPts;
      } else if (ganador === "BLUE") {
        ganadorPts = azulPts;
        perdedorPts = rojoPts;
      } else {
        return "";
      }

      var estiloNorm = normalizarEstilo(data.estilo || data.style || "FS");
      var diferencia = Math.abs(rojoPts - azulPts);

      // FALL / VIN / similares = 5-0
      if (
        resultadoFinal.indexOf("(FALL)") >= 0 ||
        resultadoFinal.indexOf("(VIN)") >= 0 ||
        resultadoFinal.indexOf("(VFA)") >= 0 ||
        resultadoFinal.indexOf("(WO)") >= 0 ||
        resultadoFinal.indexOf("(BYE)") >= 0 ||
        resultadoFinal.indexOf("(DSQ)") >= 0
      ) {
        return "5-0";
      }

      // Superioridad técnica:
      // FS / WW = diferencia 10
      // GR = diferencia 8
      var limiteSuperioridad = (estiloNorm === "GR") ? 8 : 10;

      if (diferencia >= limiteSuperioridad) {
        if (perdedorPts > 0) {
          return "4-1";
        } else {
          return "4-0";
        }
      }

      // Decisión por puntos
      if (perdedorPts > 0) {
        return "3-1";
      } else {
        return "3-0";
      }
    }

    function pintarMarcador(data) {
      if (!data) return;

      var versionActual = Number(data.version || data.updated_at || data.live_server_at || 0);

      if (versionActual > 0 && versionActual < ultimaVersionRecibida) {
        return;
      }

      if (versionActual > 0) {
        ultimaVersionRecibida = versionActual;
      }

      ultimoDato = data;

      var rojoPts = Number(valorSeguro(data.rojo_puntos, 0));
      var azulPts = Number(valorSeguro(data.azul_puntos, 0));

      var panelRojo = document.querySelector(".panel-rojo");
      var panelAzul = document.querySelector(".panel-azul");

      if (panelRojo && panelAzul) {
        panelRojo.classList.remove("lider", "ganador-final");
        panelAzul.classList.remove("lider", "ganador-final");

        var estadoLive = String(data.estado_combate || data.estado || "").toUpperCase();
        var ganadorLado = String(data.ganador_lado || "").toUpperCase();
        var ventajaLado = String(data.ventaja_lado || "").toUpperCase();

        if (estadoLive === "FINALIZADO" && ganadorLado === "RED") {
          panelRojo.classList.add("ganador-final");
        } else if (estadoLive === "FINALIZADO" && ganadorLado === "BLUE") {
          panelAzul.classList.add("ganador-final");
        } else if (rojoPts === azulPts && ventajaLado === "RED") {
          panelRojo.classList.add("lider");
        } else if (rojoPts === azulPts && ventajaLado === "BLUE") {
          panelAzul.classList.add("lider");
        } else if (rojoPts > azulPts) {
          panelRojo.classList.add("lider");
        } else if (azulPts > rojoPts) {
          panelAzul.classList.add("lider");
        }
      }

      animarSiCambio("rojo_puntos", rojoPts, puntosRojoAnterior);
      animarSiCambio("azul_puntos", azulPts, puntosAzulAnterior);

      puntosRojoAnterior = rojoPts;
      puntosAzulAnterior = azulPts;

      var eventoNombre = data.evento_nombre || "TIMING CUBA LIVE";
      var tapiz = data.tapiz || data.tatami || "Tapiz 1";
      var categoria = data.categoria || "";
      var peso = data.peso || "";
      var estilo = normalizarEstilo(data.estilo || data.style || "FS");

      setText("evento_nombre", eventoNombre, "TIMING CUBA LIVE");

      var divisionInfo = document.getElementById("division_info");
      if (divisionInfo) {
        var partes = [];
        if (tapiz) partes.push(tapiz);
        if (categoria) partes.push(categoria);
        if (peso) partes.push(peso);
        divisionInfo.innerText = partes.join(" · ");
      }

      setText("estilo_visible", estilo, "FS");

      var faseActual = data.fase_actual || data.round_public || "";
      var combateActual = data.combate_actual || data.bout_public || "";

      var faseTxt = String(faseActual || "").trim();
      var combateTxt = String(combateActual || "").trim();

      if (faseTxt === "1/8") faseTxt = "1/8 FINAL";
      if (faseTxt === "1/4") faseTxt = "1/4 FINAL";
      if (faseTxt === "1/2") faseTxt = "1/2 FINAL";
      if (faseTxt.toUpperCase() === "FINAL") faseTxt = "1-2 FINAL";
      if (faseTxt === "3-5") faseTxt = "3-5 FINAL";
      if (faseTxt.toUpperCase() === "QUALIF.") faseTxt = "QUALIF.";

      if (combateTxt && combateTxt.toUpperCase().indexOf("COMBATE") < 0) {
        combateTxt = "COMBATE " + combateTxt;
      }

      var combateInfo = "";

      if (faseTxt && combateTxt) {
        combateInfo = faseTxt + " · " + combateTxt;
      } else if (faseTxt) {
        combateInfo = faseTxt;
      } else if (combateTxt) {
        combateInfo = combateTxt;
      }

      setText("combate_info", combateInfo, "");

      setText("rojo_nombre", data.rojo_nombre, "---");
      setText("azul_nombre", data.azul_nombre, "---");
      setText("rojo_puntos", rojoPts, "0");
      setText("azul_puntos", azulPts, "0");

      actualizarRelojVisual();

      setText("periodo", data.periodo, "R1");
      setText("estado_combate", data.estado_combate || data.estado, "EN VIVO");

      setText("proximo_combate", data.proximo_combate, "Esperando próximo combate...");
      
      var clasificacionFinal = clasificacionFinalTexto(data);

      if (clasificacionFinal) {
        setText("resultado_final", clasificacionFinal, "");
      } else {
        setText("resultado_final", data.resultado_final, "Resultado: combate en progreso");
      }

      var historial = data.historial || ["Sin resultados recientes"];
      var historialBox = document.getElementById("historial");

      if (historialBox) {
        historialBox.innerHTML = "";

        if (Array.isArray(historial)) {
          for (var i = 0; i < Math.min(historial.length, 3); i++) {
            var div = document.createElement("div");
            div.className = "history-line";
            div.innerText = historial[i];
            historialBox.appendChild(div);
          }
        } else {
          var div2 = document.createElement("div");
          div2.className = "history-line";
          div2.innerText = historial;
          historialBox.appendChild(div2);
        }
      }

      setText("estado", "CONECTADO · " + (data.estado_combate || data.estado || "EN VIVO"), "EN VIVO");
    }

    function cargarJSON(url, ok, fail) {
      var xhr = new XMLHttpRequest();
      var sep = url.indexOf("?") >= 0 ? "&" : "?";
      var finalUrl = url + sep + "t=" + new Date().getTime();

      xhr.open("GET", finalUrl, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;

        if (xhr.status >= 200 && xhr.status < 300) {
          try {
            var data = JSON.parse(xhr.responseText);
            ok(data);
          } catch (e) {
            fail("JSON inválido");
          }
        } else {
          fail("HTTP " + xhr.status);
        }
      };

      xhr.onerror = function () {
        fail("Error de red");
      };

      xhr.send();
    }

    function cargarMarcador() {
      cargarJSON(
        URL_FIREBASE,
        function (data) {
          pintarMarcador(data);
        },
        function () {
          cargarJSON(
            URL_SCRIPT,
            function (data2) {
              pintarMarcador(data2);
            },
            function (error2) {
              setText("estado", "No conecta con Firebase ni Script: " + error2, "Sin conexión");
            }
          );
        }
      );
    }

    function pantallaCompleta() {
      var elem = document.documentElement;

      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      }
    }

    cargarMarcador();

    setInterval(cargarMarcador, 350);
    setInterval(actualizarRelojVisual, 150);
  </script>
