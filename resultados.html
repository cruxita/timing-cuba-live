<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados - Timing Cuba Live</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --oro: #c89a45;
      --oro2: #e2b96d;
      --linea: rgba(200, 154, 69, 0.45);
      --panel: rgba(0, 0, 0, 0.82);
      --texto: #ffffff;
      --suave: #cfcfcf;
      --rojo: #e51616;
      --azul: #1f6bff;
      --verde: #10b981;
      --gris: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(200, 154, 69, 0.16), transparent 34%),
        linear-gradient(180deg, #080808 0%, #000 74%, #040404 100%);
      color: var(--texto);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      width: min(1420px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 42px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 130px 1fr 185px;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .logo {
      width: 112px;
      height: 112px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(200, 154, 69, 0.48));
    }

    .title {
      text-align: center;
    }

    .title h1 {
      margin: 0;
      color: var(--oro);
      font-size: clamp(34px, 4vw, 58px);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 0 12px rgba(200, 154, 69, 0.42);
    }

    .title .sub {
      margin-top: 10px;
      color: #eeeeee;
      font-size: clamp(15px, 2vw, 22px);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .menu-btn {
      border: 2px solid var(--oro);
      background: rgba(0, 0, 0, 0.75);
      color: var(--oro);
      border-radius: 14px;
      padding: 14px 12px;
      font-weight: 900;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      text-transform: uppercase;
      box-shadow: 0 0 12px rgba(200, 154, 69, 0.22);
    }

    .summary {
      border: 2px solid var(--linea);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.64);
      padding: 14px 18px;
      margin: 0 0 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      box-shadow: 0 0 16px rgba(200, 154, 69, 0.12);
    }

    .mini {
      text-align: center;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      min-height: 46px;
    }

    .mini:last-child {
      border-right: none;
    }

    .mini-label {
      color: var(--oro2);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .mini-value {
      color: white;
      font-size: 17px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .filters {
      border: 2px solid rgba(200, 154, 69, 0.28);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.52);
      padding: 13px;
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1.3fr auto;
      gap: 10px;
      align-items: center;
    }

    input, select, button {
      border: 1px solid rgba(200, 154, 69, 0.38);
      background: rgba(255, 255, 255, 0.07);
      color: white;
      border-radius: 12px;
      padding: 12px 11px;
      font-size: 14px;
      font-weight: 900;
      outline: none;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
    }

    option {
      color: #111;
    }

    .clear-btn {
      cursor: pointer;
      background: rgba(200, 154, 69, 0.14);
      color: var(--oro2);
      white-space: nowrap;
    }

    .panel {
      border: 3px solid var(--linea);
      border-radius: 26px;
      background:
        radial-gradient(circle at top left, rgba(200, 154, 69, 0.14), transparent 38%),
        rgba(0, 0, 0, 0.82);
      box-shadow:
        0 0 18px rgba(200, 154, 69, 0.20),
        inset 0 0 24px rgba(200, 154, 69, 0.05);
      overflow: hidden;
    }

    .panel-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      background:
        linear-gradient(135deg, rgba(200, 154, 69, 0.28), rgba(0, 0, 0, 0.12));
      border-bottom: 2px solid var(--linea);
    }

    .panel-title {
      color: var(--oro);
      font-size: 30px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 0 10px rgba(200, 154, 69, 0.34);
    }

    .note {
      color: #d8d8d8;
      border: 2px solid rgba(200, 154, 69, 0.42);
      background: rgba(200, 154, 69, 0.08);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .content {
      padding: 18px;
    }

    .evento-block {
      margin-bottom: 22px;
      border: 2px solid rgba(200, 154, 69, 0.36);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.035);
    }

    .evento-head {
      padding: 16px 18px;
      background:
        linear-gradient(90deg, rgba(200, 154, 69, 0.24), rgba(0,0,0,0.20));
      border-bottom: 2px solid rgba(200, 154, 69, 0.28);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .evento-title {
      color: var(--oro2);
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(200, 154, 69, 0.44);
      border-radius: 999px;
      padding: 7px 12px;
      color: white;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      background: rgba(0,0,0,0.34);
    }

    .sistema-block {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    .sistema-block:last-child {
      border-bottom: none;
    }

    .sistema-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .sistema-title {
      font-size: 21px;
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sistema-title .rr {
      color: #8ee6bf;
    }

    .sistema-title .ch {
      color: #9dc2ff;
    }

    .division-block {
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      margin: 12px 0;
      background: rgba(0,0,0,0.28);
      overflow: hidden;
    }

    .division-head {
      padding: 13px 15px;
      background: rgba(255,255,255,0.06);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .division-title {
      font-size: 17px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--oro2);
    }

    .fase-block {
      padding: 12px 14px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.09);
    }

    .fase-block:last-child {
      border-bottom: none;
    }

    .fase-title {
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: inline-flex;
      border-left: 5px solid var(--oro);
      padding-left: 8px;
    }

    .fight-row {
      display: grid;
      grid-template-columns: 95px 1fr 96px 1fr 190px 105px 82px;
      gap: 8px;
      align-items: stretch;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .fight-row:last-child {
      border-bottom: none;
    }

    .cell {
      border-radius: 12px;
      padding: 9px 10px;
      background: rgba(255,255,255,0.065);
      display: flex;
      align-items: center;
      min-height: 46px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .combat {
      justify-content: center;
      color: var(--oro2);
      text-align: center;
      font-size: 12px;
    }

    .red {
      background: linear-gradient(135deg, rgba(160, 0, 0, 0.90), rgba(45, 0, 0, 0.84));
      border: 1px solid rgba(255, 35, 35, 0.48);
      color: #fff0f0;
    }

    .blue {
      background: linear-gradient(135deg, rgba(0, 66, 170, 0.92), rgba(0, 18, 65, 0.86));
      border: 1px solid rgba(45, 130, 255, 0.55);
      color: #edf4ff;
    }

    .score {
      justify-content: center;
      color: white;
      font-size: 23px;
      letter-spacing: 1px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .winner {
      color: var(--oro2);
      background: rgba(200, 154, 69, 0.10);
      border: 1px solid rgba(200, 154, 69, 0.32);
    }

    .badge {
      justify-content: center;
      color: white;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.34);
      text-align: center;
    }

    .classif {
      justify-content: center;
      color: var(--oro2);
      background: rgba(200, 154, 69, 0.10);
      border: 1px solid rgba(200, 154, 69, 0.28);
      font-size: 17px;
    }

    .team {
      display: block;
      color: rgba(255,255,255,0.68);
      font-size: 10px;
      margin-top: 3px;
      font-weight: 900;
    }

    .empty {
      padding: 44px 18px;
      text-align: center;
      color: #cfcfcf;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.35;
    }

    .footer {
      text-align: center;
      color: #a8a8a8;
      font-size: 13px;
      font-weight: 900;
      margin-top: 18px;
      text-transform: uppercase;
    }

    @media (max-width: 1180px) {
      .fight-row {
        grid-template-columns: 82px 1fr 82px 1fr;
      }

      .winner, .badge, .classif {
        grid-column: span 1;
      }
    }

    @media (max-width: 980px) {
      .topbar {
        grid-template-columns: 76px 1fr;
        gap: 10px;
      }

      .logo {
        width: 70px;
        height: 70px;
      }

      .title {
        text-align: left;
      }

      .menu-btn {
        grid-column: 1 / -1;
        justify-self: center;
        padding: 10px 18px;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .mini:nth-child(2),
      .mini:nth-child(4) {
        border-right: none;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters input,
      .clear-btn {
        grid-column: 1 / -1;
      }

      .panel-head,
      .evento-head,
      .division-head {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .sistema-head {
        justify-content: center;
        text-align: center;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 16px, 1420px);
        padding-top: 12px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .mini {
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        padding-bottom: 8px;
      }

      .mini:last-child {
        border-bottom: none;
      }

      .panel-title {
        font-size: 24px;
      }

      .content {
        padding: 10px;
      }

      .evento-title {
        font-size: 20px;
      }

      .sistema-block {
        padding: 10px;
      }

      .fight-row {
        grid-template-columns: 1fr;
        border: 2px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 10px;
        margin-bottom: 10px;
        background: rgba(255,255,255,0.04);
      }

      .cell {
        min-height: 42px;
        justify-content: center;
        text-align: center;
      }

      .score {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div>
        <img class="logo" src="logo.png" alt="Timing Cuba Logo" />
      </div>

      <div class="title">
        <h1>Resultados</h1>
        <div class="sub">Organizados por evento - sistema - division</div>
      </div>

      <a class="menu-btn" href="menu.html?v=10">Menu</a>
    </header>

    <section class="summary">
      <div class="mini">
        <div class="mini-label">Evento principal</div>
        <div id="evento_nombre" class="mini-value">Timing Cuba Live</div>
      </div>
      <div class="mini">
        <div class="mini-label">Resultados</div>
        <div id="total_resultados" class="mini-value">0</div>
      </div>
      <div class="mini">
        <div class="mini-label">Eventos</div>
        <div id="total_eventos" class="mini-value">0</div>
      </div>
      <div class="mini">
        <div class="mini-label">Divisiones</div>
        <div id="total_divisiones" class="mini-value">0</div>
      </div>
      <div class="mini">
        <div class="mini-label">Estado</div>
        <div id="estado_datos" class="mini-value">Cargando...</div>
      </div>
    </section>

    <section class="filters">
      <input id="buscar" type="search" placeholder="Buscar atleta, equipo, fase..." />
      <select id="filtro_evento"><option value="">Todos los eventos</option></select>
      <select id="filtro_sistema"><option value="">Todos los sistemas</option></select>
      <select id="filtro_division"><option value="">Todas las divisiones</option></select>
      <button id="limpiar_filtros" class="clear-btn" type="button">Limpiar</button>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Resultados oficiales</div>
        <div class="note">Vista por bloques - Mas clara para muchos eventos</div>
      </div>

      <div id="resultados_bloques" class="content">
        <div class="empty">Cargando resultados...</div>
      </div>
    </section>

    <div class="footer">Timing Cuba Live - Resultados</div>
  </main>

  <script>
    var DATA_URL = "datos/resultados.json";
    var resultadosOriginales = [];

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(txt) {
      return String(txt || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizar(txt) {
      return String(txt || "").trim().toUpperCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function setText(id, valor, defecto) {
      var el = $(id);
      if (!el) return;
      el.innerText = (valor === undefined || valor === null || valor === "") - (defecto || "") : valor;
    }

    function limpiarDivision(item) {
      if (item.division) return String(item.division || "").trim();

      var estilo = item.estilo || "";
      var categoria = item.categoria || "";
      var peso = item.peso - item.peso + " KG" : "";

      return [estilo, categoria, peso].filter(Boolean).join(" - ");
    }

    function valorUnico(lista, fn) {
      var set = {};

      lista.forEach(function(item) {
        var v = normalizar(fn(item));

        if (v) {
          set[v] = true;
        }
      });

      return Object.keys(set).sort();
    }

    function llenarSelect(id, valores, textoInicial) {
      var sel = $(id);
      if (!sel) return;

      var actual = sel.value;
      sel.innerHTML = '<option value="">' + textoInicial + '</option>';

      valores.forEach(function(v) {
        var op = document.createElement("option");
        op.value = v;
        op.textContent = v;
        sel.appendChild(op);
      });

      if (valores.indexOf(actual) >= 0) {
        sel.value = actual;
      }
    }

    function filtrarResultados() {
      var q = normalizar($("buscar").value);
      var evento = normalizar($("filtro_evento").value);
      var sistema = normalizar($("filtro_sistema").value);
      var division = normalizar($("filtro_division").value);

      return resultadosOriginales.filter(function(item) {
        var div = limpiarDivision(item);

        var texto = normalizar([
          item.evento,
          item.sistema,
          div,
          item.estilo,
          item.categoria,
          item.peso,
          item.fase,
          item.combate,
          item.rojo,
          item.rojo_equipo,
          item.azul,
          item.azul_equipo,
          item.ganador,
          item.ganador_equipo,
          item.tipo_victoria,
          item.puntos_clasificacion
        ].join(" "));

        if (q && texto.indexOf(q) < 0) return false;
        if (evento && normalizar(item.evento) !== evento) return false;
        if (sistema && normalizar(item.sistema) !== sistema) return false;
        if (division && normalizar(div) !== division) return false;

        return true;
      });
    }

    function agrupar(lista, fn) {
      var salida = {};

      lista.forEach(function(item) {
        var k = String(fn(item) || "").trim() || "SIN DEFINIR";

        if (!salida[k]) {
          salida[k] = [];
        }

        salida[k].push(item);
      });

      return salida;
    }

    function ordenarKeys(keys, tipo) {
      if (tipo === "sistema") {
        var ordenSistema = {
          "ROUND ROBIN": 1,
          "CHAMPIONS": 2,
          "LLAVES UWW": 3
        };

        return keys.sort(function(a, b) {
          return (ordenSistema[normalizar(a)] || 99) - (ordenSistema[normalizar(b)] || 99) ||
                 a.localeCompare(b);
        });
      }

      return keys.sort(function(a, b) {
        return a.localeCompare(b);
      });
    }

    function claseSistema(nombre) {
      var n = normalizar(nombre);

      if (n.indexOf("ROUND") >= 0) return "rr";
      if (n.indexOf("CHAMP") >= 0) return "ch";

      return "";
    }

    function pintarCombate(item) {
      var victoria = item.tipo_victoria || "-";
      var clasif = item.puntos_clasificacion || "0-0";
      var ganador = item.ganador || "";
      var ganadorEquipo = item.ganador_equipo || "";

      return '' +
        '<div class="fight-row">' +
          '<div class="cell combat">' + escapeHtml(item.combate || "") + '</div>' +

          '<div class="cell red">' +
            '<div>' +
              escapeHtml(item.rojo || "ROJO") +
              '<span class="team">' + escapeHtml(item.rojo_equipo || "") + '</span>' +
            '</div>' +
          '</div>' +

          '<div class="cell score">' + escapeHtml(item.marcador || "0-0") + '</div>' +

          '<div class="cell blue">' +
            '<div>' +
              escapeHtml(item.azul || "AZUL") +
              '<span class="team">' + escapeHtml(item.azul_equipo || "") + '</span>' +
            '</div>' +
          '</div>' +

          '<div class="cell winner">' +
            '<div>' +
              'Ganador: ' + escapeHtml(ganador || "-") +
              '<span class="team">' + escapeHtml(ganadorEquipo || "") + '</span>' +
            '</div>' +
          '</div>' +

          '<div class="cell badge">' + escapeHtml(victoria) + '</div>' +
          '<div class="cell classif">' + escapeHtml(clasif) + '</div>' +
        '</div>';
    }

    function pintarBloques() {
      var cont = $("resultados_bloques");
      if (!cont) return;

      var lista = filtrarResultados();

      setText("total_resultados", lista.length + " / " + resultadosOriginales.length, "0");

      var eventosTotal = valorUnico(resultadosOriginales, function(item) { return item.evento; }).length;
      var divisionesTotal = valorUnico(resultadosOriginales, function(item) { return limpiarDivision(item); }).length;

      setText("total_eventos", eventosTotal, "0");
      setText("total_divisiones", divisionesTotal, "0");

      if (!lista.length) {
        cont.innerHTML = '<div class="empty">No hay resultados para esos filtros.</div>';
        return;
      }

      var eventos = agrupar(lista, function(item) { return item.evento || "EVENTO SIN NOMBRE"; });
      var html = "";

      ordenarKeys(Object.keys(eventos), "evento").forEach(function(eventoNombre) {
        var listaEvento = eventos[eventoNombre];
        var sistemas = agrupar(listaEvento, function(item) { return item.sistema || "Sistema"; });

        html += '<section class="evento-block">';
        html +=   '<div class="evento-head">';
        html +=     '<div class="evento-title">' + escapeHtml(eventoNombre) + '</div>';
        html +=     '<div class="count-pill">' + listaEvento.length + ' resultados</div>';
        html +=   '</div>';

        ordenarKeys(Object.keys(sistemas), "sistema").forEach(function(sistemaNombre) {
          var listaSistema = sistemas[sistemaNombre];
          var divisiones = agrupar(listaSistema, function(item) { return limpiarDivision(item); });

          html += '<div class="sistema-block">';
          html +=   '<div class="sistema-head">';
          html +=     '<div class="sistema-title"><span class="' + claseSistema(sistemaNombre) + '">' + escapeHtml(sistemaNombre) + '</span></div>';
          html +=     '<div class="count-pill">' + listaSistema.length + ' combates</div>';
          html +=   '</div>';

          ordenarKeys(Object.keys(divisiones), "division").forEach(function(divisionNombre) {
            var listaDivision = divisiones[divisionNombre];
            var fases = agrupar(listaDivision, function(item) { return item.fase || "Combates"; });

            html += '<section class="division-block">';
            html +=   '<div class="division-head">';
            html +=     '<div class="division-title">' + escapeHtml(divisionNombre) + '</div>';
            html +=     '<div class="count-pill">' + listaDivision.length + ' resultados</div>';
            html +=   '</div>';

            Object.keys(fases).forEach(function(faseNombre) {
              var listaFase = fases[faseNombre];

              html += '<div class="fase-block">';
              html +=   '<div class="fase-title">' + escapeHtml(faseNombre) + '</div>';

              listaFase.forEach(function(item) {
                html += pintarCombate(item);
              });

              html += '</div>';
            });

            html += '</section>';
          });

          html += '</div>';
        });

        html += '</section>';
      });

      cont.innerHTML = html;
    }

    function prepararFiltros() {
      llenarSelect(
        "filtro_evento",
        valorUnico(resultadosOriginales, function(item) { return item.evento; }),
        "Todos los eventos"
      );

      llenarSelect(
        "filtro_sistema",
        valorUnico(resultadosOriginales, function(item) { return item.sistema; }),
        "Todos los sistemas"
      );

      llenarSelect(
        "filtro_division",
        valorUnico(resultadosOriginales, function(item) { return limpiarDivision(item); }),
        "Todas las divisiones"
      );
    }

    function cargarDatos() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", DATA_URL + "?t=" + new Date().getTime(), true);

      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;

        if (xhr.status >= 200 && xhr.status < 300) {
          try {
            var data = JSON.parse(xhr.responseText);

            resultadosOriginales = Array.isArray(data.resultados) - data.resultados : [];

            setText("evento_nombre", data.evento_nombre || "TODOS LOS EVENTOS", "TODOS LOS EVENTOS");
            setText("estado_datos", resultadosOriginales.length - "Conectado" : "Sin datos", "Sin datos");

            prepararFiltros();
            pintarBloques();
          } catch (e) {
            setText("estado_datos", "JSON inv?lido", "JSON inv?lido");
            resultadosOriginales = [];
            pintarBloques();
          }
        } else {
          setText("estado_datos", "Sin datos", "Sin datos");
          resultadosOriginales = [];
          pintarBloques();
        }
      };

      xhr.onerror = function () {
        setText("estado_datos", "Sin conexi?n", "Sin conexi?n");
        resultadosOriginales = [];
        pintarBloques();
      };

      xhr.send();
    }

    ["buscar", "filtro_evento", "filtro_sistema", "filtro_division"].forEach(function(id) {
      var el = $(id);
      if (!el) return;
      el.addEventListener("input", pintarBloques);
      el.addEventListener("change", pintarBloques);
    });

    $("limpiar_filtros").addEventListener("click", function() {
      $("buscar").value = "";
      $("filtro_evento").value = "";
      $("filtro_sistema").value = "";
      $("filtro_division").value = "";
      pintarBloques();
    });

    cargarDatos();
    setInterval(cargarDatos, 5000);
  </script>
</body>
</html>
