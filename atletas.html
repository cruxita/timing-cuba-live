<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atletas - Timing Cuba Live</title>
  <style>
    :root {
      --bg: #05070d;
      --card: #111827;
      --card2: #0b1220;
      --text: #f9fafb;
      --muted: #9ca3af;
      --line: rgba(255,255,255,0.12);
      --accent: #facc15;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(5, 7, 13, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
    }

    .btn-main {
      background: var(--accent);
      color: #111827;
      border-color: transparent;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 18px 42px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-radius: 12px;
      padding: 13px 12px;
      font-size: 15px;
      outline: none;
      font-weight: 700;
    }

    option {
      color: #111827;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      margin: 6px 2px 18px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10), transparent 55%),
        linear-gradient(135deg, rgba(250,204,21,0.14), rgba(59,130,246,0.12)),
        var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      padding: 18px;
    }

    .photo {
      width: 172px;
      height: 172px;
      max-width: 88%;
      max-height: 88%;
      object-fit: cover;
      display: block;
      border-radius: 999px;
      background: #ffffff;
      border: 7px solid #ffffff;
      box-shadow:
        0 0 0 2px rgba(250, 204, 21, 0.55),
        0 14px 34px rgba(0,0,0,0.38),
        inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .placeholder {
      width: 172px;
      height: 172px;
      max-width: 88%;
      max-height: 88%;
      border-radius: 999px;
      border: 7px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 900;
      color: rgba(255,255,255,0.86);
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.16), rgba(255,255,255,0.05)),
        rgba(255,255,255,0.06);
      box-shadow:
        0 0 0 2px rgba(250, 204, 21, 0.55),
        0 14px 34px rgba(0,0,0,0.38);
    }

    .body {
      padding: 14px;
    }

    .name {
      font-size: 21px;
      line-height: 1.08;
      font-weight: 950;
      text-transform: uppercase;
      margin-bottom: 8px;
      min-height: 46px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 9px;
      min-height: 42px;
    }

    .pill small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .pill strong {
      display: block;
      font-size: 14px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .club {
      margin-top: 8px;
      color: var(--muted);
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty, .error {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      padding: 22px;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239,68,68,0.35);
    }

    @media (max-width: 860px) {
      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters input {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 12px 10px;
      }

      .topbar-inner {
        align-items: stretch;
      }

      .brand h1 {
        font-size: 30px;
      }

      .brand span {
        font-size: 11px;
      }

      .actions {
        width: 100%;
        gap: 6px;
      }

      .btn {
        flex: 1;
        text-align: center;
        padding: 9px 8px;
        border-radius: 10px;
        font-size: 12px;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .filters input {
        grid-column: 1 / -1;
      }

      input, select {
        padding: 10px 9px;
        font-size: 13px;
        border-radius: 10px;
      }

      main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .summary {
        font-size: 12px;
        margin-bottom: 12px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .card {
        border-radius: 16px;
      }

      .photo-wrap {
        padding: 9px;
        aspect-ratio: 1 / 1;
      }

      .photo {
        width: 96px;
        height: 96px;
        max-width: 88%;
        max-height: 88%;
        border-width: 5px;
        box-shadow:
          0 0 0 1px rgba(250, 204, 21, 0.50),
          0 8px 20px rgba(0,0,0,0.35);
      }

      .placeholder {
        width: 96px;
        height: 96px;
        max-width: 88%;
        max-height: 88%;
        border-width: 5px;
        font-size: 28px;
        box-shadow:
          0 0 0 1px rgba(250, 204, 21, 0.50),
          0 8px 20px rgba(0,0,0,0.35);
      }

      .body {
        padding: 9px;
      }

      .name {
        font-size: 13px;
        line-height: 1.08;
        min-height: 30px;
        margin-bottom: 5px;
        letter-spacing: 0.2px;
      }

      .club {
        margin-top: 4px;
        font-size: 10px;
      }

      .meta {
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        margin-top: 7px;
      }

      .pill {
        border-radius: 8px;
        padding: 5px 4px;
        min-height: 30px;
      }

      .pill small {
        font-size: 7px;
        letter-spacing: 0.4px;
        margin-bottom: 2px;
      }

      .pill strong {
        font-size: 10px;
      }
    }

    @media (min-width: 521px) and (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .photo {
        width: 124px;
        height: 124px;
        border-width: 6px;
      }

      .placeholder {
        width: 124px;
        height: 124px;
        border-width: 6px;
        font-size: 34px;
      }

      .name {
        font-size: 16px;
        min-height: 36px;
      }

      .pill strong {
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .grid {
        gap: 8px;
      }

      .photo {
        width: 82px;
        height: 82px;
        border-width: 4px;
      }

      .placeholder {
        width: 82px;
        height: 82px;
        border-width: 4px;
        font-size: 24px;
      }

      .name {
        font-size: 12px;
        min-height: 28px;
      }

      .pill {
        min-height: 28px;
      }

      .pill small {
        font-size: 6.5px;
      }

      .pill strong {
        font-size: 9px;
      }
    }

    /* ==========================================================
      MOVIL - TARJETAS COMPACTAS 2 POR FILA
      ESTE BLOQUE VA AL FINAL DEL CSS PARA QUE MANDE SOBRE TODO
      ========================================================== */

      @media (max-width: 768px) {
      .grid,
      .cards,
      .atletas-grid,
      .athletes-grid,
      #grid,
      #cards,
      #atletasGrid,
      #athletesGrid,
      #listaAtletas {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 10px !important;
      }

      .card,
      .atleta-card,
      .athlete-card {
        width: 100% !important;
        max-width: none !important;
        border-radius: 14px !important;
        overflow: hidden !important;
      }

      .card img,
      .atleta-card img,
      .athlete-card img,
      .foto,
      .photo,
      .avatar {
        width: 100% !important;
        height: 145px !important;
        object-fit: cover !important;
        object-position: center center !important;
      }

      .card h2,
      .card h3,
      .atleta-card h2,
      .atleta-card h3,
      .athlete-card h2,
      .athlete-card h3,
      .nombre,
      .athlete-name {
        font-size: 16px !important;
        line-height: 1.05 !important;
        margin: 8px 8px 6px !important;
      }

      .provincia,
      .club,
      .team,
      .subtitulo {
        font-size: 12px !important;
        margin: 0 8px 6px !important;
      }

      .info-grid,
      .details,
      .datos,
      .meta {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 6px !important;
        padding: 8px !important;
      }

      .info-grid div,
      .details div,
      .datos div,
      .meta div {
        padding: 6px !important;
        border-radius: 8px !important;
        font-size: 11px !important;
      }
    }

    @media (max-width: 420px) {
      .grid,
      .cards,
      .atletas-grid,
      .athletes-grid,
      #grid,
      #cards,
      #atletasGrid,
      #athletesGrid,
      #listaAtletas {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 8px !important;
      }

      .card img,
      .atleta-card img,
      .athlete-card img,
      .foto,
      .photo,
      .avatar {
        height: 130px !important;
      }

      .card h2,
      .card h3,
      .atleta-card h2,
      .atleta-card h3,
      .athlete-card h2,
      .athlete-card h3,
      .nombre,
      .athlete-name {
        font-size: 14px !important;
      }
    } 
    
    /* ==========================================================
      MUNICIPIO SOBRE LA FOTO DEL ATLETA
      ========================================================== */

      .photo-wrap {
      position: relative;
    }

    .municipio-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 38px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(250, 204, 21, 0.96);
      color: #111827;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
      font-size: 13px;
      font-weight: 950;
      text-align: center;
      letter-spacing: 0.5px;
      z-index: 3;
    }

    @media (max-width: 520px) {
      .municipio-badge {
        top: 7px;
        right: 7px;
        min-width: 30px;
        padding: 4px 6px;
        font-size: 10px;
        border-width: 1px;
      }
    }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Atletas</h1>
        <span>Timing Cuba Live</span>
      </div>

      <div class="actions">
        <a class="btn" href="index.html">Inicio</a>
        <a class="btn btn-main" href="tapiz-a.html">Tapiz A</a>
        <a class="btn btn-main" href="tapiz-b.html">Tapiz B</a>
      </div>
    </div>
  </header>

  <main>
    <section class="filters">
      <input id="buscar" type="search" placeholder="Buscar por nombre, club, país, peso..." />

      <select id="filtroEstilo">
        <option value="">Todos los estilos</option>
      </select>

      <select id="filtroGrupo">
        <option value="">Todos los grupos</option>
      </select>

      <select id="filtroPeso">
        <option value="">Todos los pesos</option>
      </select>

      <select id="filtroClub">
        <option value="">Todos los clubes</option>
      </select>
    </section>

    <div class="summary">
      <div id="contador">Cargando atletas...</div>
      <div id="actualizado"></div>
    </div>

    <section id="contenido" class="grid"></section>
  </main>

  <script>
    const DATA_URL = "datos/atletas.json";

    let atletas = [];

    const $ = (id) => document.getElementById(id);

    function texto(valor) {
      return String(valor ?? "").trim();
    }

    function normalizarAtleta(a) {
      const nombrePublico = texto(a.nombre_publico);
      const nombreCompleto = `${texto(a.nombre)} ${texto(a.apellidos)}`.trim();

      return {
        id: texto(a.id),
        nombre: nombrePublico || nombreCompleto || "ATLETA",
        nombre_busqueda: `${nombrePublico} ${nombreCompleto}`.toLowerCase(),
        club: texto(a.club),
        pais: texto(a.pais),
        provincia: texto(a.provincia),
        municipio: texto(a.municipio),
        grupo: texto(a.grupo),
        peso: texto(a.peso),
        estilo: texto(a.estilo),
        tag_publico: texto(a.tag_publico),
        foto: texto(a.foto || a.foto_web || a.foto_path || a.imagen)
      };
    }

    function getListaDesdeJSON(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.atletas)) return data.atletas;
      if (Array.isArray(data.data)) return data.data;
      return [];
    }

    function crearOpciones(selectId, valores, etiqueta) {
      const select = $(selectId);
      const valorActual = select.value;

      select.innerHTML = `<option value="">${etiqueta}</option>`;

      [...new Set(valores.filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "es", { numeric: true }))
        .forEach((valor) => {
          const opt = document.createElement("option");
          opt.value = valor;
          opt.textContent = valor;
          select.appendChild(opt);
        });

      select.value = valorActual;
    }

    function iniciales(nombre) {
      return nombre
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(p => p[0])
        .join("")
        .toUpperCase() || "TC";
    }

    function abreviarMunicipio(valor) {
      const raw = texto(valor).toUpperCase();

      if (!raw) return "";

      if (raw.length <= 4) {
        return raw;
      }

      const limpio = raw
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^A-Z0-9\s]/g, " ")
        .trim();

      const partes = limpio
        .split(/\s+/)
        .filter(p => !["DE", "DEL", "LA", "LAS", "LOS", "EL"].includes(p));

      if (!partes.length) {
        return raw.slice(0, 4);
      }

      return partes
        .slice(0, 4)
        .map(p => p[0])
        .join("")
        .toUpperCase();
    }

    function crearCard(a) {
      const card = document.createElement("article");
      card.className = "card";

      const photoWrap = document.createElement("div");
      photoWrap.className = "photo-wrap";

      if (a.foto) {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = a.foto.replaceAll("\\", "/");
        img.alt = a.nombre;
        img.loading = "lazy";
        img.onerror = () => {
          img.remove();

          const ph = document.createElement("div");
          ph.className = "placeholder";
          ph.textContent = iniciales(a.nombre);

          photoWrap.insertBefore(ph, photoWrap.firstChild);
        };
        photoWrap.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = iniciales(a.nombre);
        photoWrap.appendChild(ph);
      }

      const municipioTexto = abreviarMunicipio(a.municipio);

      const body = document.createElement("div");
      body.className = "body";

      body.innerHTML = `
        <div class="name">${escapeHTML(a.nombre)}</div>
        <div class="club">${escapeHTML(a.club || a.provincia || a.pais || "Sin club")}</div>
        <div class="meta">
          <div class="pill"><small>ID</small><strong>${escapeHTML(a.id || "-")}</strong></div>
          <div class="pill"><small>País</small><strong>${escapeHTML(a.pais || "-")}</strong></div>
          <div class="pill"><small>Municipio</small><strong>${escapeHTML(municipioTexto || "-")}</strong></div>
          <div class="pill"><small>Grupo</small><strong>${escapeHTML(a.grupo || "-")}</strong></div>
          <div class="pill"><small>Peso</small><strong>${escapeHTML(a.peso || "-")}</strong></div>
          <div class="pill"><small>Estilo</small><strong>${escapeHTML(a.estilo || "-")}</strong></div>
          <div class="pill"><small>Tag</small><strong>${escapeHTML(a.tag_publico || "-")}</strong></div>
        </div>
      `;

      card.appendChild(photoWrap);
      card.appendChild(body);

      return card;
    }

    function escapeHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function filtrar() {
      const q = texto($("buscar").value).toLowerCase();
      const estilo = $("filtroEstilo").value;
      const grupo = $("filtroGrupo").value;
      const peso = $("filtroPeso").value;
      const club = $("filtroClub").value;

      return atletas.filter((a) => {
        const textoCompleto = [
          a.nombre_busqueda,
          a.club,
          a.pais,
          a.provincia,
          a.municipio,
          a.grupo,
          a.peso,
          a.estilo,
          a.tag_publico
        ].join(" ").toLowerCase();

        if (q && !textoCompleto.includes(q)) return false;
        if (estilo && a.estilo !== estilo) return false;
        if (grupo && a.grupo !== grupo) return false;
        if (peso && a.peso !== peso) return false;
        if (club && a.club !== club) return false;

        return true;
      });
    }

    function render() {
      const contenido = $("contenido");
      const lista = filtrar();

      contenido.innerHTML = "";

      $("contador").textContent = `${lista.length} atleta(s) mostrado(s) de ${atletas.length}`;

      if (!lista.length) {
        contenido.className = "";
        contenido.innerHTML = `<div class="empty">No hay atletas para mostrar con esos filtros.</div>`;
        return;
      }

      contenido.className = "grid";
      lista.forEach((a) => contenido.appendChild(crearCard(a)));
    }

    function llenarFiltros() {
      crearOpciones("filtroEstilo", atletas.map(a => a.estilo), "Todos los estilos");
      crearOpciones("filtroGrupo", atletas.map(a => a.grupo), "Todos los grupos");
      crearOpciones("filtroPeso", atletas.map(a => a.peso), "Todos los pesos");
      crearOpciones("filtroClub", atletas.map(a => a.club), "Todos los clubes");
    }

    async function cargarAtletas() {
      const contenido = $("contenido");

      try {
        const res = await fetch(DATA_URL + "?v=" + Date.now(), { cache: "no-store" });

        if (!res.ok) {
          throw new Error("No se pudo leer " + DATA_URL);
        }

        const data = await res.json();
        atletas = getListaDesdeJSON(data).map(normalizarAtleta);

        llenarFiltros();
        render();

        const fecha = new Date();
        $("actualizado").textContent = "Actualizado: " + fecha.toLocaleString("es-US");
      } catch (err) {
        $("contador").textContent = "No se pudo cargar atletas.json";
        contenido.className = "";
        contenido.innerHTML = `
          <div class="error">
            No se pudo abrir <b>${DATA_URL}</b>.<br><br>
            Si estás probando en la PC, abre esta página desde un servidor local o súbela a GitHub Pages.
          </div>
        `;
        console.error(err);
      }
    }

    ["buscar", "filtroEstilo", "filtroGrupo", "filtroPeso", "filtroClub"].forEach((id) => {
      $(id).addEventListener("input", render);
      $(id).addEventListener("change", render);
    });

    cargarAtletas();
  </script>
</body>
</html>
