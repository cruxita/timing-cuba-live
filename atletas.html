<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atletas - Timing Cuba Live</title>
  <style>
    :root {
      --bg: #05070d;
      --card: #111827;
      --card2: #0b1220;
      --text: #f9fafb;
      --muted: #9ca3af;
      --line: rgba(255,255,255,0.12);
      --accent: #facc15;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(5, 7, 13, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 16px 18px;
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
    }

    .btn-main {
      background: var(--accent);
      color: #111827;
      border-color: transparent;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 18px 42px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      border-radius: 12px;
      padding: 13px 12px;
      font-size: 15px;
      outline: none;
      font-weight: 700;
    }

    option {
      color: #111827;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
      margin: 6px 2px 18px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10), transparent 55%),
        linear-gradient(135deg, rgba(250,204,21,0.14), rgba(59,130,246,0.12)),
        var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
      padding: 18px;
    }

    .photo {
      width: 172px;
      height: 172px;
      max-width: 88%;
      max-height: 88%;
      object-fit: cover;
      display: block;
      border-radius: 999px;
      background: #ffffff;
      border: 7px solid #ffffff;
      box-shadow:
        0 0 0 2px rgba(250, 204, 21, 0.55),
        0 14px 34px rgba(0,0,0,0.38),
        inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .placeholder {
      width: 172px;
      height: 172px;
      max-width: 88%;
      max-height: 88%;
      border-radius: 999px;
      border: 7px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 900;
      color: rgba(255,255,255,0.86);
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.16), rgba(255,255,255,0.05)),
        rgba(255,255,255,0.06);
      box-shadow:
        0 0 0 2px rgba(250, 204, 21, 0.55),
        0 14px 34px rgba(0,0,0,0.38);
    }

    .body {
      padding: 14px;
    }

    .name {
      font-size: 21px;
      line-height: 1.08;
      font-weight: 950;
      text-transform: uppercase;
      margin-bottom: 8px;
      min-height: 46px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 9px;
      min-height: 42px;
    }

    .pill small {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .pill strong {
      display: block;
      font-size: 14px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pais-con-bandera {
      display: flex !important;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .flag-small {
      width: 34px !important;
      height: 24px !important;
      min-width: 34px !important;
      max-width: 34px !important;
      min-height: 24px !important;
      max-height: 24px !important;
      object-fit: contain !important;
      object-position: center center !important;
      display: inline-block !important;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.65);
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      flex: 0 0 34px !important;
    }

    .pais-texto {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .club {
      margin-top: 8px;
      color: var(--muted);
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty, .error {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      padding: 22px;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239,68,68,0.35);
    }

    @media (max-width: 860px) {
      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .filters input {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 12px 10px;
      }

      .topbar-inner {
        align-items: stretch;
      }

      .brand h1 {
        font-size: 30px;
      }

      .brand span {
        font-size: 11px;
      }

      .actions {
        width: 100%;
        gap: 6px;
      }

      .btn {
        flex: 1;
        text-align: center;
        padding: 9px 8px;
        border-radius: 10px;
        font-size: 12px;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .filters input {
        grid-column: 1 / -1;
      }

      input, select {
        padding: 10px 9px;
        font-size: 13px;
        border-radius: 10px;
      }

      main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .summary {
        font-size: 12px;
        margin-bottom: 12px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .card {
        border-radius: 16px;
      }

      .photo-wrap {
        padding: 9px;
        aspect-ratio: 1 / 1;
      }

      .photo {
        width: 96px;
        height: 96px;
        max-width: 88%;
        max-height: 88%;
        border-width: 5px;
        box-shadow:
          0 0 0 1px rgba(250, 204, 21, 0.50),
          0 8px 20px rgba(0,0,0,0.35);
      }

      .placeholder {
        width: 96px;
        height: 96px;
        max-width: 88%;
        max-height: 88%;
        border-width: 5px;
        font-size: 28px;
        box-shadow:
          0 0 0 1px rgba(250, 204, 21, 0.50),
          0 8px 20px rgba(0,0,0,0.35);
      }

      .body {
        padding: 9px;
      }

      .name {
        font-size: 13px;
        line-height: 1.08;
        min-height: 30px;
        margin-bottom: 5px;
        letter-spacing: 0.2px;
      }

      .club {
        margin-top: 4px;
        font-size: 10px;
      }

      .meta {
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        margin-top: 7px;
      }

      .pill {
        border-radius: 8px;
        padding: 5px 4px;
        min-height: 30px;
      }

      .pill small {
        font-size: 7px;
        letter-spacing: 0.4px;
        margin-bottom: 2px;
      }

      .pill strong {
        font-size: 10px;
      }
    }

    @media (min-width: 521px) and (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .photo {
        width: 124px;
        height: 124px;
        border-width: 6px;
      }

      .placeholder {
        width: 124px;
        height: 124px;
        border-width: 6px;
        font-size: 34px;
      }

      .name {
        font-size: 16px;
        min-height: 36px;
      }

      .pill strong {
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .grid {
        gap: 8px;
      }

      .photo {
        width: 82px;
        height: 82px;
        border-width: 4px;
      }

      .placeholder {
        width: 82px;
        height: 82px;
        border-width: 4px;
        font-size: 24px;
      }

      .name {
        font-size: 12px;
        min-height: 28px;
      }

      .pill {
        min-height: 28px;
      }

      .pill small {
        font-size: 6.5px;
      }

      .pill strong {
        font-size: 9px;
      }
    }

    /* ==========================================================
      MOVIL - TARJETAS COMPACTAS 2 POR FILA
      ESTE BLOQUE VA AL FINAL DEL CSS PARA QUE MANDE SOBRE TODO
      ========================================================== */

      @media (max-width: 768px) {
      .grid,
      .cards,
      .atletas-grid,
      .athletes-grid,
      #grid,
      #cards,
      #atletasGrid,
      #athletesGrid,
      #listaAtletas {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 10px !important;
      }

      .card,
      .atleta-card,
      .athlete-card {
        width: 100% !important;
        max-width: none !important;
        border-radius: 14px !important;
        overflow: hidden !important;
      }

      .card .photo,
      .atleta-card .photo,
      .athlete-card .photo,
      .foto,
      .photo,
      .avatar {
        width: 100% !important;
        height: 145px !important;
        object-fit: cover !important;
        object-position: center center !important;
      }

      .flag-small {
        width: 28px !important;
        height: 20px !important;
        min-width: 28px !important;
        max-width: 28px !important;
        min-height: 20px !important;
        max-height: 20px !important;
        object-fit: contain !important;
        flex: 0 0 28px !important;
      }

      .card h2,
      .card h3,
      .atleta-card h2,
      .atleta-card h3,
      .athlete-card h2,
      .athlete-card h3,
      .nombre,
      .athlete-name {
        font-size: 16px !important;
        line-height: 1.05 !important;
        margin: 8px 8px 6px !important;
      }

      .provincia,
      .club,
      .team,
      .subtitulo {
        font-size: 12px !important;
        margin: 0 8px 6px !important;
      }

      .info-grid,
      .details,
      .datos,
      .meta {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 6px !important;
        padding: 8px !important;
      }

      .info-grid div,
      .details div,
      .datos div,
      .meta div {
        padding: 6px !important;
        border-radius: 8px !important;
        font-size: 11px !important;
      }
    }

    @media (max-width: 420px) {
      .grid,
      .cards,
      .atletas-grid,
      .athletes-grid,
      #grid,
      #cards,
      #atletasGrid,
      #athletesGrid,
      #listaAtletas {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 8px !important;
      }

      .card .photo,
      .atleta-card .photo,
      .athlete-card .photo,
      .foto,
      .photo,
      .avatar {
        height: 130px !important;
      }

      .flag-small {
        width: 26px !important;
        height: 18px !important;
        min-width: 26px !important;
        max-width: 26px !important;
        min-height: 18px !important;
        max-height: 18px !important;
        object-fit: contain !important;
        flex: 0 0 26px !important;
      }

      .card h2,
      .card h3,
      .atleta-card h2,
      .atleta-card h3,
      .athlete-card h2,
      .athlete-card h3,
      .nombre,
      .athlete-name {
        font-size: 14px !important;
      }
    } 
    
    /* ==========================================================
      MUNICIPIO SOBRE LA FOTO DEL ATLETA
      ========================================================== */

      .photo-wrap {
      position: relative;
    }

    .municipio-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 38px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(250, 204, 21, 0.96);
      color: #111827;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
      font-size: 13px;
      font-weight: 950;
      text-align: center;
      letter-spacing: 0.5px;
      z-index: 3;
    }

    @media (max-width: 520px) {
      .municipio-badge {
        top: 7px;
        right: 7px;
        min-width: 30px;
        padding: 4px 6px;
        font-size: 10px;
        border-width: 1px;
      }
    }

  

    /* ==========================================================
       FIX BANDERAS WEB - PAIS EN TARJETAS DE ATLETAS
       SVG correcto + texto CUB visible
       ========================================================== */

       .pill-pais {
      min-height: 58px !important;
    }

    .pill-pais small {
      margin-bottom: 6px !important;
    }

    .pais-con-bandera {
      display: grid !important;
      grid-template-columns: 32px 1fr !important;
      align-items: center !important;
      gap: 6px !important;
      width: 100% !important;
      min-width: 0 !important;
      line-height: 1 !important;
    }

    .flag-small,
    .flag-empty {
      width: 32px !important;
      height: 22px !important;
      min-width: 32px !important;
      max-width: 32px !important;
      min-height: 22px !important;
      max-height: 22px !important;
      display: block !important;
      border-radius: 4px !important;
      border: 2px solid rgba(255, 255, 255, 0.95) !important;
      background-color: #ffffff !important;
      background-image: var(--flag-url) !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
      box-shadow:
        0 2px 8px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(250, 204, 21, 0.45) !important;
    }

    .flag-empty {
      background-image: none !important;
      opacity: 0.35 !important;
    }

    .pais-texto {
      display: block !important;
      color: var(--text) !important;
      font-size: 12px !important;
      font-weight: 950 !important;
      line-height: 1 !important;
      min-width: 0 !important;
      overflow: visible !important;
      text-overflow: clip !important;
      white-space: nowrap !important;
    }

    @media (max-width: 768px) {
      .pais-con-bandera {
        grid-template-columns: 28px 1fr !important;
        gap: 5px !important;
      }

      .flag-small,
      .flag-empty {
        width: 28px !important;
        height: 19px !important;
        min-width: 28px !important;
        max-width: 28px !important;
        min-height: 19px !important;
        max-height: 19px !important;
      }

      .pais-texto {
        font-size: 10px !important;
      }
    }

    @media (max-width: 420px) {
      .pais-con-bandera {
        grid-template-columns: 24px 1fr !important;
        gap: 4px !important;
      }

      .flag-small,
      .flag-empty {
        width: 24px !important;
        height: 16px !important;
        min-width: 24px !important;
        max-width: 24px !important;
        min-height: 16px !important;
        max-height: 16px !important;
      }

      .pais-texto {
        font-size: 9px !important;
      }
    }

  
    /* ==========================================================
      RANKING AUTO FIX - CUADRITO DENTRO DE LA TARJETA
      ========================================================== */

    .pill-ranking-auto {
      grid-column: 1 / -1 !important;
      background: linear-gradient(135deg, rgba(250,204,21,0.28), rgba(255,255,255,0.08)) !important;
      border: 1px solid rgba(250,204,21,0.65) !important;
      min-height: 52px !important;
      display: block !important;
    }

    .ranking-auto-line {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      gap: 8px !important;
      width: 100% !important;
      min-width: 0 !important;
    }

    .ranking-auto-num {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      min-width: 54px !important;
      padding: 6px 10px !important;
      border-radius: 999px !important;
      background: rgba(250,204,21,0.98) !important;
      color: #111827 !important;
      font-size: 18px !important;
      font-weight: 1000 !important;
      line-height: 1 !important;
      box-shadow: 0 6px 14px rgba(0,0,0,0.32) !important;
    }

    .ranking-auto-info {
      display: flex !important;
      flex-direction: column !important;
      align-items: flex-end !important;
      min-width: 0 !important;
      text-align: right !important;
      gap: 2px !important;
    }

    .ranking-auto-div {
      color: var(--text) !important;
      font-size: 12px !important;
      font-weight: 900 !important;
      max-width: 135px !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      white-space: nowrap !important;
    }

    .ranking-auto-campeon {
      color: #facc15 !important;
      font-size: 10px !important;
      font-weight: 950 !important;
      letter-spacing: 0.7px !important;
      text-transform: uppercase !important;
    }

    @media (max-width: 520px) {
      .pill-ranking-auto {
        min-height: 38px !important;
        padding: 6px !important;
      }

      .ranking-auto-num {
        min-width: 40px !important;
        padding: 4px 7px !important;
        font-size: 13px !important;
      }

      .ranking-auto-div {
        max-width: 85px !important;
        font-size: 9px !important;
      }

      .ranking-auto-campeon {
        font-size: 8px !important;
      }
    }

  
    /* RANKING_SAFE_FIX_INICIO */
    /* Ranking limpio: cuadrito peque?o, sin texto montado */
    .pill-ranking-auto {
      grid-column: auto !important;
      background: rgba(250,204,21,0.16) !important;
      border: 1px solid rgba(250,204,21,0.65) !important;
      min-height: 42px !important;
      padding: 8px 9px !important;
      display: block !important;
    }

    .pill-ranking-auto small {
      color: var(--muted) !important;
      font-size: 10px !important;
      font-weight: 900 !important;
      letter-spacing: 0.8px !important;
      text-transform: uppercase !important;
      margin-bottom: 3px !important;
    }

    .ranking-auto-line {
      display: block !important;
      width: 100% !important;
    }

    .ranking-auto-num {
      display: block !important;
      color: #facc15 !important;
      background: transparent !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      min-width: 0 !important;
      font-size: 18px !important;
      font-weight: 1000 !important;
      line-height: 1.05 !important;
      white-space: nowrap !important;
    }

    .ranking-auto-info,
    .ranking-auto-div,
    .ranking-auto-campeon {
      display: none !important;
    }

    @media (max-width: 520px) {
      .pill-ranking-auto {
        min-height: 30px !important;
        padding: 5px 4px !important;
      }

      .pill-ranking-auto small {
        font-size: 7px !important;
        margin-bottom: 2px !important;
      }

      .ranking-auto-num {
        font-size: 11px !important;
      }
    }
    /* RANKING_SAFE_FIX_FIN */

  
    /* RANKING_DIVISION_SAFE_FIX_INICIO */
    /* Ranking compacto: solo n?mero, sin divisi?n larga montada */
    .pill-ranking-auto {
      grid-column: auto !important;
      background: rgba(250,204,21,0.16) !important;
      border: 1px solid rgba(250,204,21,0.70) !important;
      min-height: 42px !important;
      padding: 8px 9px !important;
      display: block !important;
    }

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Atletas</h1>
        <span>Timing Cuba Live</span>
      </div>

      <div class="actions">
        <a class="btn" href="index.html">Inicio</a>
        <a class="btn btn-main" href="tapiz-a.html">Tapiz A</a>
        <a class="btn btn-main" href="tapiz-b.html">Tapiz B</a>
      </div>
    </div>
  </header>

  <main>
    <section class="filters">
      <input id="buscar" type="search" placeholder="Buscar por nombre, club, país, peso..." />

      <select id="filtroEstilo">
        <option value="">Todos los estilos</option>
      </select>

      <select id="filtroGrupo">
        <option value="">Todos los grupos</option>
      </select>

      <select id="filtroPeso">
        <option value="">Todos los pesos</option>
      </select>

      <select id="filtroClub">
        <option value="">Todos los clubes</option>
      </select>
    </section>

    <div class="summary">
      <div id="contador">Cargando atletas...</div>
      <div id="actualizado"></div>
    </div>

    <section id="contenido" class="grid"></section>
  </main>

  <script>
    const DATA_URL = "datos/atletas.json";

    let atletas = [];

    const $ = (id) => document.getElementById(id);

    function texto(valor) {
      return String(valor ?? "").trim();
    }

    function normalizarAtleta(a) {
      const nombrePublico = texto(a.nombre_publico);

      const nombreDirectoCompleto = texto(
        a.nombre_completo ||
        a.nombre_real ||
        a.nombre_original ||
        a.full_name ||
        a.display_name ||
        a.nombre_atleta ||
        a.atleta_nombre
      );

      const nombreCompleto = nombreDirectoCompleto || `${texto(a.nombre)} ${texto(a.apellidos)}`.trim();

      return {
        id: texto(a.id),
        nombre: nombrePublico || nombreCompleto || "ATLETA",
        nombre_completo: nombreCompleto,
        nombre_busqueda: `${nombrePublico} ${nombreCompleto} ${texto(a.nombre)} ${texto(a.apellidos)} ${texto(a.nombres)} ${texto(a.apellido)}`.toLowerCase(),
        club: texto(a.club),
        pais: texto(a.pais),
        provincia: texto(a.provincia),
        municipio: texto(a.municipio),
        grupo: texto(a.grupo),
        peso: texto(a.peso),
        estilo: texto(a.estilo),
        tag_publico: texto(a.tag_publico),
        foto: texto(a.foto || a.foto_web || a.foto_path || a.imagen)
      };
    }

    function getListaDesdeJSON(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.atletas)) return data.atletas;
      if (Array.isArray(data.data)) return data.data;
      return [];
    }

    function crearOpciones(selectId, valores, etiqueta) {
      const select = $(selectId);
      const valorActual = select.value;

      select.innerHTML = `<option value="">${etiqueta}</option>`;

      [...new Set(valores.filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "es", { numeric: true }))
        .forEach((valor) => {
          const opt = document.createElement("option");
          opt.value = valor;
          opt.textContent = valor;
          select.appendChild(opt);
        });

      select.value = valorActual;
    }

    function iniciales(nombre) {
      return nombre
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(p => p[0])
        .join("")
        .toUpperCase() || "TC";
    }

    function abreviarMunicipio(valor) {
      const raw = texto(valor).toUpperCase();

      if (!raw) return "";

      if (raw.length <= 4) {
        return raw;
      }

      const limpio = raw
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^A-Z0-9\s]/g, " ")
        .trim();

      const partes = limpio
        .split(/\s+/)
        .filter(p => !["DE", "DEL", "LA", "LAS", "LOS", "EL"].includes(p));

      if (!partes.length) {
        return raw.slice(0, 4);
      }

      return partes
        .slice(0, 4)
        .map(p => p[0])
        .join("")
        .toUpperCase();
    }

    function codigoBanderaPais(valor) {
      const pais = texto(valor).toUpperCase();

      const mapa = {
        CUB: "cu",
        USA: "us",
        MEX: "mx",
        ESP: "es",
        COL: "co",
        VEN: "ve",
        DOM: "do",
        PUR: "pr",
        CAN: "ca",
        BRA: "br",
        ARG: "ar",
        CHI: "cl",
        PER: "pe",
        ECU: "ec",
        PAN: "pa",
        CRC: "cr",
        GUA: "gt",
        HON: "hn",
        NCA: "ni",
        ESA: "sv",
        URU: "uy",
        PAR: "py",
        BOL: "bo",
        FRA: "fr",
        GER: "de",
        ITA: "it",
        RUS: "ru",
        UKR: "ua",
        JPN: "jp",
        CHN: "cn",
        KOR: "kr"
      };

      if (mapa[pais]) {
        return mapa[pais];
      }

      if (/^[A-Z]{2}$/.test(pais)) {
        return pais.toLowerCase();
      }

      return "";
    }

    function htmlPaisConBandera(pais) {
      const codigo = codigoBanderaPais(pais);
      const paisTexto = escapeHTML(pais || "-");

      if (!codigo) {
        return `
          <span class="pais-con-bandera">
            <span class="flag-empty"></span>
            <span class="pais-texto">${paisTexto}</span>
          </span>
        `;
      }

      return `
        <span class="pais-con-bandera">
          <span
            class="flag-small"
            style="--flag-url: url('flags/countries/${codigo}.svg');"
            aria-label="${paisTexto}"
          ></span>
          <span class="pais-texto">${paisTexto}</span>
        </span>
      `;
    }

    function crearCard(a) {
      const card = document.createElement("article");
      card.className = "card";

      const photoWrap = document.createElement("div");
      photoWrap.className = "photo-wrap";

      if (a.foto) {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = a.foto.replaceAll("\\", "/");
        img.alt = a.nombre;
        img.loading = "lazy";
        img.onerror = () => {
          img.remove();

          const ph = document.createElement("div");
          ph.className = "placeholder";
          ph.textContent = iniciales(a.nombre);

          photoWrap.insertBefore(ph, photoWrap.firstChild);
        };
        photoWrap.appendChild(img);
      } else {
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = iniciales(a.nombre);
        photoWrap.appendChild(ph);
      }

      const municipioTexto = abreviarMunicipio(a.municipio);

      const body = document.createElement("div");
      body.className = "body";

      body.innerHTML = `
        <div class="name">${escapeHTML(a.nombre)}</div>
        <div class="club">${escapeHTML(a.club || a.provincia || a.pais || "Sin club")}</div>
        <div class="meta">
          ${htmlRankingAtleta(a)}
          <div class="pill"><small>ID</small><strong>${escapeHTML(a.id || "-")}</strong></div>
          <div class="pill pill-pais"><small>País</small>${htmlPaisConBandera(a.pais)}</div>
          <div class="pill"><small>Municipio</small><strong>${escapeHTML(municipioTexto || "-")}</strong></div>
          <div class="pill"><small>Grupo</small><strong>${escapeHTML(a.grupo || "-")}</strong></div>
          <div class="pill"><small>Peso</small><strong>${escapeHTML(a.peso || "-")}</strong></div>
          <div class="pill"><small>Estilo</small><strong>${escapeHTML(a.estilo || "-")}</strong></div>
          <div class="pill"><small>Tag</small><strong>${escapeHTML(a.tag_publico || "-")}</strong></div>
        </div>
      `;

      card.appendChild(photoWrap);
      card.appendChild(body);

      return card;
    }

    function escapeHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function filtrar() {
      const q = texto($("buscar").value).toLowerCase();
      const estilo = $("filtroEstilo").value;
      const grupo = $("filtroGrupo").value;
      const peso = $("filtroPeso").value;
      const club = $("filtroClub").value;

      return atletas.filter((a) => {
        const textoCompleto = [
          a.nombre_busqueda,
          a.club,
          a.pais,
          a.provincia,
          a.municipio,
          a.grupo,
          a.peso,
          a.estilo,
          a.tag_publico
        ].join(" ").toLowerCase();

        if (q && !textoCompleto.includes(q)) return false;
        if (estilo && a.estilo !== estilo) return false;
        if (grupo && a.grupo !== grupo) return false;
        if (peso && a.peso !== peso) return false;
        if (club && a.club !== club) return false;

        return true;
      });
    }

    function render() {
      const contenido = $("contenido");
      const lista = filtrar();

      contenido.innerHTML = "";

      $("contador").textContent = `${lista.length} atleta(s) mostrado(s) de ${atletas.length}`;

      if (!lista.length) {
        contenido.className = "";
        contenido.innerHTML = `<div class="empty">No hay atletas para mostrar con esos filtros.</div>`;
        return;
      }

      contenido.className = "grid";
      lista.forEach((a) => contenido.appendChild(crearCard(a)));
    }

    function llenarFiltros() {
      crearOpciones("filtroEstilo", atletas.map(a => a.estilo), "Todos los estilos");
      crearOpciones("filtroGrupo", atletas.map(a => a.grupo), "Todos los grupos");
      crearOpciones("filtroPeso", atletas.map(a => a.peso), "Todos los pesos");
      crearOpciones("filtroClub", atletas.map(a => a.club), "Todos los clubes");
    }

    async function cargarAtletas() {
      const contenido = $("contenido");

      try {
        const res = await fetch(DATA_URL + "?v=" + Date.now(), { cache: "no-store" });

        if (!res.ok) {
          throw new Error("No se pudo leer " + DATA_URL);
        }

        const data = await res.json();
        atletas = getListaDesdeJSON(data).map(normalizarAtleta);

        await cargarRankingAutoFix();
        aplicarRankingAutoFix();
llenarFiltros();
        render();

        const fecha = new Date();
        $("actualizado").textContent = "Actualizado: " + fecha.toLocaleString("es-US");
      } catch (err) {
        $("contador").textContent = "No se pudo cargar atletas.json";
        contenido.className = "";
        contenido.innerHTML = `
          <div class="error">
            No se pudo abrir <b>${DATA_URL}</b>.<br><br>
            Si estás probando en la PC, abre esta página desde un servidor local o súbela a GitHub Pages.
          </div>
        `;
        console.error(err);
      }
    }


    // ==========================================================
    // RANKING_AUTO_FIX - Une atletas.html con datos/ranking_atletas.json
    // ==========================================================

    const RANKING_AUTO_FIX_URL = "datos/ranking_atletas.json";
    let rankingAutoLista = [];
    let rankingAutoPorFoto = new Map();

    function rankingAutoTexto(valor) {
      return String(valor ?? "").trim();
    }

    function rankingAutoClave(valor) {
      return rankingAutoTexto(valor)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase()
        .replace(/[^A-Z0-9 ]/g, " ")
        .replace(/\b(DE|DEL|LA|LAS|LOS|EL|Y)\b/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function rankingAutoTokens(valor) {
      return rankingAutoClave(valor)
        .split(" ")
        .filter((t) => t.length >= 2);
    }

    function rankingAutoFotoArchivo(valor) {
      const limpio = String(valor ?? "")
        .replaceAll("\\", "/")
        .trim()
        .toLowerCase();

      if (!limpio) return "";

      return limpio.split("/").pop();
    }

    function rankingAutoListaDesdeJSON(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.ranking)) return data.ranking;
      if (Array.isArray(data.top_10)) return data.top_10;
      if (Array.isArray(data.atletas)) return data.atletas;
      if (Array.isArray(data.data)) return data.data;
      return [];
    }

    function rankingAutoDivisionCorta(r) {
      const division = rankingAutoTexto(
        r.division_principal ||
        (Array.isArray(r.divisiones) && r.divisiones.length ? r.divisiones[0] : "")
      );

      if (!division) return "";

      const partes = division
        .split("|")
        .map((p) => rankingAutoTexto(p))
        .filter(Boolean);

      if (partes.length >= 2) {
        return partes.slice(1).join(" | ");
      }

      return division;
    }

    async function cargarRankingAutoFix() {
      rankingAutoLista = [];
      rankingAutoPorFoto = new Map();

      try {
        const res = await fetch(RANKING_AUTO_FIX_URL + "?v=" + Date.now(), { cache: "no-store" });

        if (!res.ok) {
          console.warn("No se pudo leer ranking:", RANKING_AUTO_FIX_URL);
          return;
        }

        const data = await res.json();
        const lista = rankingAutoListaDesdeJSON(data);

        rankingAutoLista = lista
          .map((r) => {
            const nombre = rankingAutoTexto(r.nombre);
            const fotoArchivo = rankingAutoFotoArchivo(r.foto);

            return {
              original: r,
              posicion: Number(r.posicion || 0),
              nombre: nombre,
              nombreClave: rankingAutoClave(nombre),
              tokens: rankingAutoTokens(nombre),
              fotoArchivo: fotoArchivo,
              division: rankingAutoDivisionCorta(r),
              campeon: Boolean(r.campeon)
            };
          })
          .filter((r) => r.posicion && r.nombreClave);

        rankingAutoLista.forEach((r) => {
          if (r.fotoArchivo) {
            rankingAutoPorFoto.set(r.fotoArchivo, r);
          }
        });

        console.log("Ranking cargado para atletas:", rankingAutoLista.length);
      } catch (err) {
        console.warn("Ranking no disponible para atletas.html", err);
      }
    }

    function buscarRankingAutoFix(a) {
      const fotoAtleta = rankingAutoFotoArchivo(a.foto);

      if (fotoAtleta && rankingAutoPorFoto.has(fotoAtleta)) {
        return rankingAutoPorFoto.get(fotoAtleta);
      }

      const textoAtleta = rankingAutoClave([
        a.nombre,
        a.nombre_completo,
        a.nombre_busqueda
      ].join(" "));

      const tokensAtleta = rankingAutoTokens(textoAtleta);
      const setAtleta = new Set(tokensAtleta);

      const inicialAtleta = tokensAtleta.length ? tokensAtleta[0][0] : "";

      let mejor = null;
      let mejorPuntos = 0;

      for (const r of rankingAutoLista) {
        if (r.nombreClave && textoAtleta.includes(r.nombreClave)) {
          return r;
        }

        const tokensRanking = r.tokens || [];

        if (!tokensRanking.length) {
          continue;
        }

        const inicialRanking = tokensRanking[0] ? tokensRanking[0][0] : "";
        const coincideInicial = inicialAtleta && inicialRanking && inicialAtleta === inicialRanking;

        const comunes = tokensRanking.filter((t) => setAtleta.has(t));
        const cantidadComunes = comunes.length;

        let puntos = 0;

        if (coincideInicial) puntos += 4;
        puntos += cantidadComunes * 6;

        const acepta =
          cantidadComunes >= 2 ||
          (coincideInicial && cantidadComunes >= 1);

        if (acepta && puntos > mejorPuntos) {
          mejor = r;
          mejorPuntos = puntos;
        }
      }

      return mejor;
    }

    function aplicarRankingAutoFix() {
      atletas = atletas.map((a) => ({
        ...a,
        ranking_auto_fix: buscarRankingAutoFix(a)
      }));
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      const division = r.division ? escapeHTML(r.division) : "";
      const campeon = r.campeon ? `<span class="ranking-auto-campeon">Campe?n</span>` : "";

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
              <span class="ranking-auto-info">
                ${division ? `<span class="ranking-auto-div">${division}</span>` : ""}
                ${campeon}
              </span>
            </div>
          </div>
      `;
    }



    // RANKING_SAFE_FIX_INICIO
    // Uni?n segura: NO usa foto, NO usa apellido solo, NO usa inicial+apellido.
    // Solo muestra ranking cuando el nombre completo del atleta coincide con el ranking.

    function buscarRankingAutoFix(a) {
      const nombreCompletoAtleta = rankingAutoClave(
        a.nombre_completo || a.nombre_busqueda || ""
      );

      if (!nombreCompletoAtleta) {
        return null;
      }

      const tokensAtleta = rankingAutoTokens(nombreCompletoAtleta);
      const setAtleta = new Set(tokensAtleta);

      if (tokensAtleta.length < 2) {
        return null;
      }

      for (const r of rankingAutoLista) {
        const tokensRanking = Array.isArray(r.tokens)
          ? r.tokens.filter((t) => t.length >= 2)
          : [];

        if (tokensRanking.length < 2) {
          continue;
        }

        const nombreRanking = rankingAutoClave(r.nombre || "");

        if (nombreRanking && nombreCompletoAtleta === nombreRanking) {
          return r;
        }

        const todosLosTokensDelRankingEstanEnAtleta = tokensRanking.every((t) => setAtleta.has(t));

        if (todosLosTokensDelRankingEstanEnAtleta) {
          return r;
        }
      }

      return null;
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
            </div>
          </div>
      `;
    }
    // RANKING_SAFE_FIX_FIN



    // RANKING_DIVISION_SAFE_FIX_INICIO
    // Uni?n segura por nombre + estilo + grupo/categor?a + peso.
    // Evita confundir hermanos o atletas con el mismo apellido.

    function rankingDivisionTexto(r) {
      const partes = [];

      if (r.division) {
        partes.push(r.division);
      }

      if (r.original && r.original.division_principal) {
        partes.push(r.original.division_principal);
      }

      if (r.original && Array.isArray(r.original.divisiones)) {
        r.original.divisiones.forEach((d) => partes.push(d));
      }

      return rankingAutoClave(partes.join(" "));
    }

    function rankingNumeroPeso(valor) {
      const limpio = String(valor ?? "").replace(",", ".").trim();

      if (!limpio || limpio === "-") {
        return "";
      }

      const match = limpio.match(/\d+(\.\d+)?/);

      return match ? match[0] : "";
    }

    function rankingCoincideDivision(a, r) {
      const division = rankingDivisionTexto(r);

      if (!division) {
        return false;
      }

      const estilo = rankingAutoClave(a.estilo);
      const grupo = rankingAutoClave(a.grupo);
      const peso = rankingNumeroPeso(a.peso);

      if (estilo && !division.split(" ").includes(estilo)) {
        return false;
      }

      if (grupo && grupo !== "-") {
        const tokensGrupo = rankingAutoTokens(grupo);

        for (const tg of tokensGrupo) {
          if (!division.split(" ").includes(tg)) {
            return false;
          }
        }
      }

      if (peso) {
        const numerosDivision = division.match(/\d+(\.\d+)?/g) || [];

        if (!numerosDivision.includes(peso)) {
          return false;
        }
      }

      return true;
    }

    function buscarRankingAutoFix(a) {
      const nombreCompletoAtleta = rankingAutoClave(
        a.nombre_completo || a.nombre_busqueda || a.nombre || ""
      );

      if (!nombreCompletoAtleta) {
        return null;
      }

      const tokensAtleta = rankingAutoTokens(nombreCompletoAtleta);
      const setAtleta = new Set(tokensAtleta);

      if (tokensAtleta.length < 2) {
        return null;
      }

      let mejor = null;
      let mejorPuntos = 0;

      for (const r of rankingAutoLista) {
        if (!rankingCoincideDivision(a, r)) {
          continue;
        }

        const tokensRanking = Array.isArray(r.tokens)
          ? r.tokens.filter((t) => t.length >= 2)
          : [];

        if (tokensRanking.length < 2) {
          continue;
        }

        const nombreRanking = rankingAutoClave(r.nombre || "");

        if (nombreRanking && nombreCompletoAtleta === nombreRanking) {
          return r;
        }

        const comunes = tokensRanking.filter((t) => setAtleta.has(t));
        const cantidadComunes = comunes.length;

        const todosRankingEnAtleta = tokensRanking.every((t) => setAtleta.has(t));

        let puntos = 0;

        if (todosRankingEnAtleta) {
          puntos += 100;
        }

        puntos += cantidadComunes * 10;

        const acepta =
          todosRankingEnAtleta ||
          cantidadComunes >= 2;

        if (acepta && puntos > mejorPuntos) {
          mejor = r;
          mejorPuntos = puntos;
        }
      }

      return mejor;
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
            </div>
          </div>
      `;
    }
    // RANKING_DIVISION_SAFE_FIX_FIN



    // RANKING_NOMBRE_FINO_FIX_INICIO
    // Uni?n fina:
    // - NO usa foto
    // - NO usa apellido solo
    // - NO usa inicial + apellido
    // - usa nombre completo
    // - estilo/grupo/peso ayudan a desempatar, pero no bloquean al atleta correcto

    function rankingExtraerDivisionTextoFino(r) {
      const partes = [];

      if (r.division) partes.push(r.division);

      if (r.original && r.original.division_principal) {
        partes.push(r.original.division_principal);
      }

      if (r.original && Array.isArray(r.original.divisiones)) {
        r.original.divisiones.forEach((d) => partes.push(d));
      }

      return rankingAutoClave(partes.join(" "));
    }

    function rankingExtraerPesoFino(valor) {
      const txt = String(valor ?? "").replace(",", ".").trim();
      const m = txt.match(/\d+(\.\d+)?/);
      return m ? m[0] : "";
    }

    function rankingPuntosDivisionFino(a, r) {
      const division = rankingExtraerDivisionTextoFino(r);
      let puntos = 0;

      if (!division) {
        return puntos;
      }

      const estilo = rankingAutoClave(a.estilo);
      const grupo = rankingAutoClave(a.grupo);
      const peso = rankingExtraerPesoFino(a.peso);
      const tokensDivision = new Set(rankingAutoTokens(division));
      const numerosDivision = division.match(/\d+(\.\d+)?/g) || [];

      if (estilo && tokensDivision.has(estilo)) {
        puntos += 20;
      }

      if (grupo) {
        const tokensGrupo = rankingAutoTokens(grupo);
        const okGrupo = tokensGrupo.length && tokensGrupo.every((t) => tokensDivision.has(t));

        if (okGrupo) {
          puntos += 20;
        }
      }

      if (peso && numerosDivision.includes(peso)) {
        puntos += 20;
      }

      return puntos;
    }

    function buscarRankingAutoFix(a) {
      const nombreAtleta = rankingAutoClave(
        a.nombre_completo || a.nombre_busqueda || a.nombre || ""
      );

      if (!nombreAtleta) {
        return null;
      }

      const tokensAtleta = rankingAutoTokens(nombreAtleta);
      const setAtleta = new Set(tokensAtleta);

      if (tokensAtleta.length < 2) {
        return null;
      }

      let mejor = null;
      let mejorPuntos = 0;

      for (const r of rankingAutoLista) {
        const nombreRanking = rankingAutoClave(r.nombre || "");

        if (!nombreRanking) {
          continue;
        }

        const tokensRanking = Array.isArray(r.tokens)
          ? r.tokens.filter((t) => t.length >= 2)
          : rankingAutoTokens(nombreRanking);

        if (tokensRanking.length < 2) {
          continue;
        }

        let puntosNombre = 0;

        if (nombreAtleta === nombreRanking) {
          puntosNombre = 120;
        } else {
          const primerRanking = tokensRanking[0];
          const ultimoRanking = tokensRanking[tokensRanking.length - 1];

          const primerAtleta = tokensAtleta[0];
          const ultimoAtleta = tokensAtleta[tokensAtleta.length - 1];

          const rankingDentroAtleta = tokensRanking.every((t) => setAtleta.has(t));
          const mismoPrimerNombre = primerRanking && primerAtleta && primerRanking === primerAtleta;
          const mismoUltimoApellido = ultimoRanking && ultimoAtleta && ultimoRanking === ultimoAtleta;

          const comunes = tokensRanking.filter((t) => setAtleta.has(t)).length;

          if (rankingDentroAtleta && mismoPrimerNombre) {
            puntosNombre = 100;
          } else if (mismoPrimerNombre && mismoUltimoApellido) {
            puntosNombre = 90;
          } else if (mismoPrimerNombre && comunes >= 2) {
            puntosNombre = 80;
          } else {
            puntosNombre = 0;
          }
        }

        if (!puntosNombre) {
          continue;
        }

        const puntosDivision = rankingPuntosDivisionFino(a, r);
        const total = puntosNombre + puntosDivision;

        if (total > mejorPuntos) {
          mejor = r;
          mejorPuntos = total;
        }
      }

      return mejor;
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
            </div>
          </div>
      `;
    }
    // RANKING_NOMBRE_FINO_FIX_FIN



    // RANKING_FINAL_INTELIGENTE_FIX_INICIO
    // Regla final:
    // - NO regala ranking por apellido solo.
    // - La foto solo sirve si la division es compatible.
    // - Nombre completo manda.
    // - Inicial + apellido solo se acepta si es ?nico y compatible.

    function rankingFinalTextoDivision(r) {
      const partes = [];

      if (r.division) partes.push(r.division);

      if (r.original && r.original.division_principal) {
        partes.push(r.original.division_principal);
      }

      if (r.original && Array.isArray(r.original.divisiones)) {
        r.original.divisiones.forEach((d) => partes.push(d));
      }

      if (r.original && r.original.estilo) partes.push(r.original.estilo);
      if (r.original && r.original.grupo) partes.push(r.original.grupo);
      if (r.original && r.original.peso) partes.push(r.original.peso);

      return rankingAutoClave(partes.join(" "));
    }

    function rankingFinalPeso(valor) {
      const txt = String(valor ?? "").replace(",", ".").trim();

      if (!txt || txt === "-") {
        return "";
      }

      const m = txt.match(/\d+(\.\d+)?/);
      return m ? m[0] : "";
    }

    function rankingFinalDivisionCompatible(a, r) {
      const division = rankingFinalTextoDivision(r);

      if (!division) {
        return true;
      }

      const tokensDivision = new Set(rankingAutoTokens(division));
      const numerosDivision = division.match(/\d+(\.\d+)?/g) || [];

      const estilo = rankingAutoClave(a.estilo);
      const grupo = rankingAutoClave(a.grupo);
      const peso = rankingFinalPeso(a.peso);

      if (estilo && estilo !== "-" && !tokensDivision.has(estilo)) {
        return false;
      }

      if (grupo && grupo !== "-") {
        const tokensGrupo = rankingAutoTokens(grupo);

        if (tokensGrupo.length && !tokensGrupo.every((t) => tokensDivision.has(t))) {
          return false;
        }
      }

      if (peso && !numerosDivision.includes(peso)) {
        return false;
      }

      return true;
    }

    function rankingFinalPuntosDivision(a, r) {
      const division = rankingFinalTextoDivision(r);

      if (!division) {
        return 0;
      }

      const tokensDivision = new Set(rankingAutoTokens(division));
      const numerosDivision = division.match(/\d+(\.\d+)?/g) || [];

      const estilo = rankingAutoClave(a.estilo);
      const grupo = rankingAutoClave(a.grupo);
      const peso = rankingFinalPeso(a.peso);

      let puntos = 0;

      if (estilo && tokensDivision.has(estilo)) puntos += 20;

      if (grupo) {
        const tokensGrupo = rankingAutoTokens(grupo);
        if (tokensGrupo.length && tokensGrupo.every((t) => tokensDivision.has(t))) {
          puntos += 20;
        }
      }

      if (peso && numerosDivision.includes(peso)) puntos += 20;

      return puntos;
    }

    function rankingFinalArchivoFoto(valor) {
      const limpio = String(valor ?? "")
        .replaceAll("\\", "/")
        .trim()
        .toLowerCase();

      if (!limpio) return "";

      return limpio.split("/").pop();
    }

    function rankingFinalFirmaInicialApellido(a) {
      const nombre = rankingAutoClave(a.nombre || "");
      const tokens = rankingAutoTokens(nombre);

      if (tokens.length < 2) return "";

      const primero = tokens[0];
      const ultimo = tokens[tokens.length - 1];

      if (primero.length === 1 && ultimo.length >= 2) {
        return primero + "|" + ultimo;
      }

      return "";
    }

    function rankingFinalFirmaRanking(r) {
      const tokens = Array.isArray(r.tokens)
        ? r.tokens.filter((t) => t.length >= 2)
        : rankingAutoTokens(r.nombre || "");

      if (tokens.length < 2) return "";

      return tokens[0][0] + "|" + tokens[tokens.length - 1];
    }

    function buscarRankingAutoFix(a) {
      const nombreAtleta = rankingAutoClave(
        a.nombre_completo || a.nombre_busqueda || a.nombre || ""
      );

      const tokensAtleta = rankingAutoTokens(nombreAtleta);
      const setAtleta = new Set(tokensAtleta);

      const fotoAtleta = rankingFinalArchivoFoto(a.foto);

      let candidatos = [];

      for (const r of rankingAutoLista) {
        if (!rankingFinalDivisionCompatible(a, r)) {
          continue;
        }

        const nombreRanking = rankingAutoClave(r.nombre || "");
        const tokensRanking = Array.isArray(r.tokens)
          ? r.tokens.filter((t) => t.length >= 2)
          : rankingAutoTokens(nombreRanking);

        if (!tokensRanking.length) {
          continue;
        }

        let puntos = 0;

        if (nombreRanking && nombreAtleta && nombreAtleta === nombreRanking) {
          puntos += 500;
        }

        if (tokensAtleta.length >= 2) {
          const rankingDentroAtleta = tokensRanking.every((t) => setAtleta.has(t));
          const comunes = tokensRanking.filter((t) => setAtleta.has(t)).length;

          if (rankingDentroAtleta) {
            puntos += 300;
          }

          if (comunes >= 2) {
            puntos += comunes * 50;
          }
        }

        const fotoRanking = rankingFinalArchivoFoto(r.fotoArchivo || (r.original && r.original.foto) || "");

        if (fotoAtleta && fotoRanking && fotoAtleta === fotoRanking) {
          puntos += 220;
        }

        puntos += rankingFinalPuntosDivision(a, r);

        if (puntos > 0) {
          candidatos.push({
            ranking: r,
            puntos: puntos
          });
        }
      }

      candidatos.sort((a, b) => b.puntos - a.puntos);

      if (candidatos.length && candidatos[0].puntos >= 220) {
        return candidatos[0].ranking;
      }

      const firmaAtleta = rankingFinalFirmaInicialApellido(a);

      if (firmaAtleta) {
        const candidatosFirma = rankingAutoLista.filter((r) => {
          return rankingFinalFirmaRanking(r) === firmaAtleta &&
                 rankingFinalDivisionCompatible(a, r);
        });

        if (candidatosFirma.length === 1) {
          return candidatosFirma[0];
        }
      }

      return null;
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
            </div>
          </div>
      `;
    }
    // RANKING_FINAL_INTELIGENTE_FIX_FIN



    // RANKING_ID_PRIMERO_FIX_INICIO
    // Regla final:
    // 1) ID manda cuando existe en ranking_atletas.json.
    // 2) Si no hay ID, usa respaldo por nombre completo + división.
    // 3) Nunca usa foto sola ni apellido solo.

    function rankingIdFixId(valor) {
      const txt = String(valor ?? "").trim();

      if (!txt || txt === "-") {
        return "";
      }

      if (/^\d+$/.test(txt)) {
        return String(parseInt(txt, 10));
      }

      return txt;
    }

    function rankingIdFixRankingId(r) {
      const o = r.original || {};

      return rankingIdFixId(
        o.atleta_id ||
        o.id_atleta ||
        o.id ||
        r.atleta_id ||
        r.id_atleta ||
        r.id
      );
    }

    function rankingIdFixTextoDivision(r) {
      const o = r.original || {};
      const partes = [];

      if (r.division) partes.push(r.division);
      if (o.division_principal) partes.push(o.division_principal);
      if (Array.isArray(o.divisiones)) o.divisiones.forEach((d) => partes.push(d));
      if (o.estilo) partes.push(o.estilo);
      if (o.grupo) partes.push(o.grupo);
      if (o.peso) partes.push(o.peso);

      return rankingAutoClave(partes.join(" "));
    }

    function rankingIdFixPeso(valor) {
      const txt = String(valor ?? "").replace(",", ".").trim();

      if (!txt || txt === "-") {
        return "";
      }

      const m = txt.match(/\d+(\.\d+)?/);

      return m ? m[0] : "";
    }

    function rankingIdFixDivisionScore(a, r) {
      const division = rankingIdFixTextoDivision(r);

      if (!division) {
        return 0;
      }

      const tokensDivision = new Set(rankingAutoTokens(division));
      const numerosDivision = division.match(/\d+(\.\d+)?/g) || [];

      const estilo = rankingAutoClave(a.estilo);
      const grupo = rankingAutoClave(a.grupo);
      const peso = rankingIdFixPeso(a.peso);

      let puntos = 0;

      if (estilo && estilo !== "-" && tokensDivision.has(estilo)) {
        puntos += 25;
      }

      if (grupo && grupo !== "-") {
        const tokensGrupo = rankingAutoTokens(grupo);

        if (tokensGrupo.length && tokensGrupo.every((t) => tokensDivision.has(t))) {
          puntos += 25;
        }
      }

      if (peso && numerosDivision.includes(peso)) {
        puntos += 25;
      }

      return puntos;
    }

    function rankingIdFixNombreScore(a, r) {
      const nombreAtleta = rankingAutoClave(
        a.nombre_completo || a.nombre_busqueda || a.nombre || ""
      );

      const nombreRanking = rankingAutoClave(
        (r.original && r.original.nombre) || r.nombre || ""
      );

      if (!nombreAtleta || !nombreRanking) {
        return 0;
      }

      const tokensAtleta = rankingAutoTokens(nombreAtleta);
      const tokensRanking = rankingAutoTokens(nombreRanking);

      if (tokensAtleta.length < 2 || tokensRanking.length < 2) {
        return 0;
      }

      const setAtleta = new Set(tokensAtleta);

      if (nombreAtleta === nombreRanking) {
        return 500;
      }

      const rankingDentroAtleta = tokensRanking.every((t) => setAtleta.has(t));
      const mismoPrimerNombre = tokensRanking[0] === tokensAtleta[0];
      const mismoUltimoApellido = tokensRanking[tokensRanking.length - 1] === tokensAtleta[tokensAtleta.length - 1];
      const comunes = tokensRanking.filter((t) => setAtleta.has(t)).length;

      if (rankingDentroAtleta && mismoPrimerNombre) {
        return 420;
      }

      if (mismoPrimerNombre && mismoUltimoApellido) {
        return 360;
      }

      if (mismoPrimerNombre && comunes >= 2) {
        return 300;
      }

      return 0;
    }

    function buscarRankingAutoFix(a) {
      const atletaId = rankingIdFixId(a.id);

      if (atletaId) {
        for (const r of rankingAutoLista) {
          if (rankingIdFixRankingId(r) === atletaId) {
            return r;
          }
        }
      }

      let candidatos = [];

      for (const r of rankingAutoLista) {
        const puntosNombre = rankingIdFixNombreScore(a, r);

        if (!puntosNombre) {
          continue;
        }

        const puntosDivision = rankingIdFixDivisionScore(a, r);
        const total = puntosNombre + puntosDivision;

        candidatos.push({
          ranking: r,
          total: total,
          puntosNombre: puntosNombre,
          puntosDivision: puntosDivision
        });
      }

      if (!candidatos.length) {
        return null;
      }

      candidatos.sort((a, b) => b.total - a.total);

      const primero = candidatos[0];

      if (candidatos.length === 1) {
        return primero.ranking;
      }

      const segundo = candidatos[1];

      // Si queda empate fuerte, no se muestra ranking para evitar error.
      if (primero.total === segundo.total) {
        return null;
      }

      // Si la diferencia es pequeña y no hubo ayuda de división, no arriesga.
      if ((primero.total - segundo.total) < 40 && primero.puntosDivision === 0) {
        return null;
      }

      return primero.ranking;
    }

    function htmlRankingAtleta(a) {
      const r = a.ranking_auto_fix;

      if (!r || !r.posicion) {
        return "";
      }

      return `
          <div class="pill pill-ranking-auto">
            <small>Ranking</small>
            <div class="ranking-auto-line">
              <span class="ranking-auto-num">#${escapeHTML(r.posicion)}</span>
            </div>
          </div>
      `;
    }
    // RANKING_ID_PRIMERO_FIX_FIN


    ["buscar", "filtroEstilo", "filtroGrupo", "filtroPeso", "filtroClub"].forEach((id) => {
      $(id).addEventListener("input", render);
      $(id).addEventListener("change", render);
    });

    cargarAtletas();
  </script>
